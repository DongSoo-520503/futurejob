<body>

        <a class="lang-btn" href="https://www.futurejob.site/tr/">🇹🇷 TR</a>

        <a class="lang-btn" href="https://www.futurejob.site/ar/">🇦🇪 AR</a>
        <a class="lang-btn" href="https://www.futurejob.site/zh/">🇨🇳 ZH</a>
      
      </div>
    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Профессии будущего</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Полное имя</label>
          <input id="name" name="name" type="text" placeholder="Введите ваше имя" required>
        </div>

        <div class="field">
          <label for="dob">Год рождения <span style="font-weight:400;color:#64748b">: определяет период начала карьеры</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="напр. 2005" required>
        </div>

        <div class="field">
          <label for="country">Целевая страна</label>
          <select id="country" name="country">
            <option value="러시아">🇷🇺 Россия</option>
            <option value="미국">🇺🇸 США</option>
            <option value="영국">🇬🇧 Великобритания</option>
            <option value="캐나다">🇨🇦 Канада</option>
            <option value="호주">🇦🇺 Австралия</option>
            <option value="독일">🇩🇪 Германия</option>
            <option value="프랑스">🇫🇷 Франция</option>
            <option value="이탈리아">🇮🇹 Италия</option>
            <option value="스위스">🇨🇭 Швейцария</option>
            <option value="폴란드">🇵🇱 Польша</option>
            <option value="싱가포르">🇸🇬 Сингапур</option>
            <option value="일본">🇯🇵 Япония</option>
            <option value="중국">🇨🇳 Китай</option>
            <option value="인도">🇮🇳 Индия</option>
            <option value="베트남">🇻🇳 Вьетнам</option>
            <option value="태국">🇹🇭 Таиланд</option>
            <option value="인도네시아">🇮🇩 Индонезия</option>
            <option value="아랍에미리트">🇦🇪 ОАЭ</option>
            <option value="사우디아라비아">🇸🇦 Саудовская Аравия</option>
            <option value="이스라엘">🇮🇱 Израиль</option>
            <option value="튀르키예">🇹🇷 Турция</option>
            <option value="멕시코">🇲🇽 Мексика</option>
            <option value="브라질">🇧🇷 Бразилия</option>
            <option value="남아프리카공화국">🇿🇦 ЮАР</option>
            <option value="나이지리아">🇳🇬 Нигерия</option>
            <option value="대한민국">🇰🇷 Южная Корея</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Учебный план <span style="font-weight:400;color:#64748b">: учитывайте интеллект, усилия и оценки</span></label>
          <select id="ability" name="ability">
            <option value="상">Магистратура / Аспирантура (рождённые 2000–2029)</option>
            <option value="중">Бакалавриат / Высшее образование (рождённые 2004–2033)</option>
            <option value="하">Техникум / Профессиональное училище (рождённые 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Тип профессионального интереса (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Реалистичный — Люблю работать с машинами и инструментами</option>
            <option value="I">🔬 Исследовательский — Обожаю данные, науку и решение задач</option>
            <option value="A">🎨 Артистический — Выражаю себя через дизайн и творчество</option>
            <option value="S">🤝 Социальный — Нахожу смысл в помощи людям</option>
            <option value="E">🚀 Предпринимательский — Лидерство и убеждение — мои сильные стороны</option>
            <option value="C">📋 Конвенциональный — Предпочитаю структурированную и упорядоченную работу</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Тип личности (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Открытость — Любознательный, творческий, любит новые идеи</option>
            <option value="C">📌 Добросовестность — Организованный, ответственный, надёжный</option>
            <option value="E">😊 Экстраверсия — Заряжается энергией в социальной среде</option>
            <option value="A">💛 Доброжелательность — Отзывчивый, кооперативный и эмпатичный</option>
            <option value="N">🛡 Нейротизм — Осторожный, чуткий к рискам, внимательный к деталям</option>
          </select>
        </div>

        <div class="gold-divider"></div>
        <button type="submit" class="submit-btn">Узнать мою профессию будущего →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Результаты на корейском — используйте автоперевод Chrome.
      </p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Пожалуйста, введите корректный год рождения (напр. 2005).';
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5, lang: 'ru'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

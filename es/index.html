<body>
  <div class="container">
    <div class="lang-switcher">

        <a class="lang-btn" href="https://www.futurejob.site/it/">🇮🇹 IT</a>
        <a class="lang-btn" href="https://www.futurejob.site/pl/">🇵🇱 PL</a>
        <a class="lang-btn" href="https://www.futurejob.site/tr/">🇹🇷 TR</a>
        <a class="lang-btn" href="https://www.futurejob.site/vi/">🇻🇳 VI</a>
        <a class="lang-btn" href="https://www.futurejob.site/id/">🇮🇩 ID</a>
        <a class="lang-btn" href="https://www.futurejob.site/th/">🇹🇭 TH</a>
        <a class="lang-btn" href="https://www.futurejob.site/ar/">🇦🇪 AR</a>
        <a class="lang-btn" href="https://www.futurejob.site/zh/">🇨🇳 ZH</a>
      
      </div>
    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Empleos del Futuro</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Nombre completo</label>
          <input id="name" name="name" type="text" placeholder="Ingresa tu nombre" required>
        </div>

        <div class="field">
          <label for="dob">Año de nacimiento <span style="font-weight:400;color:#64748b">: determina el período de incorporación laboral</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="ej. 2005" required>
        </div>

        <div class="field">
          <label for="country">País objetivo</label>
          <select id="country" name="country">
            <option value="멕시코">🇲🇽 México</option>
            <option value="태국">🇹🇭 Tailandia</option>
            <option value="미국">🇺🇸 Estados Unidos</option>
            <option value="영국">🇬🇧 Reino Unido</option>
            <option value="캐나다">🇨🇦 Canadá</option>
            <option value="호주">🇦🇺 Australia</option>
            <option value="독일">🇩🇪 Alemania</option>
            <option value="프랑스">🇫🇷 Francia</option>
            <option value="이탈리아">🇮🇹 Italia</option>
            <option value="스위스">🇨🇭 Suiza</option>
            <option value="폴란드">🇵🇱 Polonia</option>
            <option value="싱가포르">🇸🇬 Singapur</option>
            <option value="일본">🇯🇵 Japón</option>
            <option value="중국">🇨🇳 China</option>
            <option value="인도">🇮🇳 India</option>
            <option value="베트남">🇻🇳 Vietnam</option>
            <option value="인도네시아">🇮🇩 Indonesia</option>
            <option value="아랍에미리트">🇦🇪 Emiratos Árabes Unidos</option>
            <option value="사우디아라비아">🇸🇦 Arabia Saudita</option>
            <option value="이스라엘">🇮🇱 Israel</option>
            <option value="튀르키예">🇹🇷 Turquía</option>
            <option value="브라질">🇧🇷 Brasil</option>
            <option value="남아프리카공화국">🇿🇦 Sudáfrica</option>
            <option value="나이지리아">🇳🇬 Nigeria</option>
            <option value="러시아">🇷🇺 Rusia</option>
            <option value="대한민국">🇰🇷 Corea del Sur</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Plan académico <span style="font-weight:400;color:#64748b">: considera inteligencia, esfuerzo y notas</span></label>
          <select id="ability" name="ability">
            <option value="상">Maestría / Doctorado planeado (nacidos 2000–2029)</option>
            <option value="중">Licenciatura / Universidad planeada (nacidos 2004–2033)</option>
            <option value="하">Técnico / Vocacional planeado (nacidos 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Tipo de interés profesional (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Realista — Me gusta trabajar con máquinas y herramientas</option>
            <option value="I">🔬 Investigador — Amo los datos, la ciencia y resolver problemas</option>
            <option value="A">🎨 Artístico — Me expreso a través del diseño y la creatividad</option>
            <option value="S">🤝 Social — Me realiza ayudar y trabajar con personas</option>
            <option value="E">🚀 Emprendedor — El liderazgo y la persuasión me definen</option>
            <option value="C">📋 Convencional — Prefiero trabajo estructurado y ordenado</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Tipo de personalidad (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Abierto — Curioso, imaginativo, ama nuevas ideas</option>
            <option value="C">📌 Responsable — Organizado, cumplidor y confiable</option>
            <option value="E">😊 Extrovertido — Se energiza en entornos sociales</option>
            <option value="A">💛 Amable — Servicial, cooperativo y empático</option>
            <option value="N">🛡 Neurótico — Precavido, sensible al riesgo, detallista</option>
          </select>
        </div>
        <div class="gold-divider"></div>

        
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Los resultados están en coreano — usa la traducción automática de Chrome.
      </p>
        <button type="submit" class="submit-btn">Ver mi carrera del futuro →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Por favor ingresa un año de nacimiento válido (ej. 2005).';
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5,
        lang:    'es'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5,
        lang: 'es'
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

<script>
  // 언어 버튼 스크롤 항상 맨 왼쪽 고정
  document.addEventListener('DOMContentLoaded', function() {
    var sw = document.querySelector('.lang-switcher');
    if (sw) { sw.scrollLeft = 0; }
  });
</script>
</body>

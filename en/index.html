    <div class="header">
      <!-- Language switcher -->
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Future Career Recommendation</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Enter your name" required>
        </div>

        <div class="field">
          <label for="dob">Birth Year <span style="font-weight:400;color:#64748b">: determines employment timing</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="e.g. 2005" required>
        </div>

        <div class="field">
          <label for="country">Target Country</label>
          <select id="country" name="country">
            <option value="미국">🇺🇸 United States</option>
            <option value="영국">🇬🇧 United Kingdom</option>
            <option value="캐나다">🇨🇦 Canada</option>
            <option value="호주">🇦🇺 Australia</option>
            <option value="독일">🇩🇪 Germany</option>
            <option value="프랑스">🇫🇷 France</option>
            <option value="이탈리아">🇮🇹 Italy</option>
            <option value="스위스">🇨🇭 Switzerland</option>
            <option value="폴란드">🇵🇱 Poland</option>
            <option value="싱가포르">🇸🇬 Singapore</option>
            <option value="일본">🇯🇵 Japan</option>
            <option value="중국">🇨🇳 China</option>
            <option value="인도">🇮🇳 India</option>
            <option value="베트남">🇻🇳 Vietnam</option>
            <option value="태국">🇹🇭 Thailand</option>
            <option value="인도네시아">🇮🇩 Indonesia</option>
            <option value="아랍에미리트">🇦🇪 UAE</option>
            <option value="사우디아라비아">🇸🇦 Saudi Arabia</option>
            <option value="이스라엘">🇮🇱 Israel</option>
            <option value="튀르키예">🇹🇷 Turkey</option>
            <option value="멕시코">🇲🇽 Mexico</option>
            <option value="브라질">🇧🇷 Brazil</option>
            <option value="남아프리카공화국">🇿🇦 South Africa</option>
            <option value="나이지리아">🇳🇬 Nigeria</option>
            <option value="러시아">🇷🇺 Russia</option>
            <option value="대한민국">🇰🇷 South Korea</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Academic Plan <span style="font-weight:400;color:#64748b">: consider GPA, effort & IQ</span></label>
          <select id="ability" name="ability">
            <option value="상">Master's / PhD or higher (born 2000–2029)</option>
            <option value="중">Bachelor's / Graduate (born 2004–2033)</option>
            <option value="하">Vocational / Community College (born 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Career Interest Type (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Realistic — I enjoy working with tools, machines & hands-on tasks</option>
            <option value="I">🔬 Investigative — I love research, data, science & problem-solving</option>
            <option value="A">🎨 Artistic — I express myself through design, art or creative work</option>
            <option value="S">🤝 Social — I find meaning in helping and working with people</option>
            <option value="E">🚀 Enterprising — I thrive in leadership, persuasion & bold goals</option>
            <option value="C">📋 Conventional — I prefer structured, organized, detail-oriented work</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Personality Type (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Open — Curious, imaginative, loves new ideas & change</option>
            <option value="C">📌 Conscientious — Goal-driven, responsible, follows through</option>
            <option value="E">😊 Extraverted — Energized by people, active in social settings</option>
            <option value="A">💛 Agreeable — Naturally helpful, cooperative & empathetic</option>
            <option value="N">🛡 Neurotic — Cautious, sensitive to risk, detail-aware</option>
          </select>
        </div>

        <div class="gold-divider"></div>
        <button type="submit" class="submit-btn">See My Future Career →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Results are in Korean — use Chrome's auto-translate for your language.
      </p>
    </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      // Birth year validation
      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Please enter a valid birth year (e.g. 2005).';
        return;
      }

      // GA4: form submit event
      gtag('event', 'submit_form', {
        country: userData.country,
        ability: userData.ability,
        riasec:  userData.riasec,
        big5:    userData.big5,
        lang:    'en'
      });

      const params = new URLSearchParams({
        name:    userData.name,
        dob:     userData.dob,
        country: userData.country,
        ability: userData.ability,
        riasec:  userData.riasec,
        big5:    userData.big5
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

<script>
  // 언어 버튼 스크롤 항상 맨 왼쪽 고정
  document.addEventListener('DOMContentLoaded', function() {

    if (sw) { sw.scrollLeft = 0; }

</script>

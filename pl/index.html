    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Zawody Przyszłości</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Imię i nazwisko</label>
          <input id="name" name="name" type="text" placeholder="Wpisz swoje imię" required>
        </div>

        <div class="field">
          <label for="dob">Rok urodzenia <span style="font-weight:400;color:#64748b">: określa okres wejścia na rynek pracy</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="np. 2005" required>
        </div>

        <div class="field">
          <label for="country">Docelowy kraj</label>
          <select id="country" name="country">
            <option value="폴란드">🇵🇱 Polska</option>
            <option value="미국">🇺🇸 미국</option>
            <option value="영국">🇬🇧 영국</option>
            <option value="캐나다">🇨🇦 캐나다</option>
            <option value="호주">🇦🇺 호주</option>
            <option value="독일">🇩🇪 독일</option>
            <option value="프랑스">🇫🇷 프랑스</option>
            <option value="이탈리아">🇮🇹 이탈리아</option>
            <option value="스위스">🇨🇭 스위스</option>
            <option value="싱가포르">🇸🇬 싱가포르</option>
            <option value="일본">🇯🇵 일본</option>
            <option value="중국">🇨🇳 중국</option>
            <option value="인도">🇮🇳 인도</option>
            <option value="베트남">🇻🇳 베트남</option>
            <option value="태국">🇹🇭 태국</option>
            <option value="인도네시아">🇮🇩 인도네시아</option>
            <option value="아랍에미리트">🇦🇪 아랍에미리트</option>
            <option value="사우디아라비아">🇸🇦 사우디아라비아</option>
            <option value="이스라엘">🇮🇱 이스라엘</option>
            <option value="튀르키예">🇹🇷 튀르키예</option>
            <option value="멕시코">🇲🇽 멕시코</option>
            <option value="브라질">🇧🇷 브라질</option>
            <option value="남아프리카공화국">🇿🇦 남아프리카공화국</option>
            <option value="나이지리아">🇳🇬 나이지리아</option>
            <option value="러시아">🇷🇺 러시아</option>
            <option value="대한민국">🇰🇷 대한민국</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Plan edukacyjny <span style="font-weight:400;color:#64748b">: uwzględnij inteligencję, wysiłek i oceny</span></label>
          <select id="ability" name="ability">
            <option value="상">Studia magisterskie / Doktorat (urodzeni 2000–2029)</option>
            <option value="중">Licencjat / Studia wyższe (urodzeni 2004–2033)</option>
            <option value="하">Technikum / Szkoła zawodowa (urodzeni 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Typ zainteresowań zawodowych (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Realistyczny — Lubię pracować z maszynami i narzędziami</option>
            <option value="I">🔬 Badawczy — Uwielbiam dane, naukę i rozwiązywanie problemów</option>
            <option value="A">🎨 Artystyczny — Wyrażam się przez design i kreatywność</option>
            <option value="S">🤝 Społeczny — Spełniam się pomagając innym i pracując z ludźmi</option>
            <option value="E">🚀 Przedsiębiorczy — Przywództwo i przekonywanie to moje mocne strony</option>
            <option value="C">📋 Konwencjonalny — Preferuję pracę ustrukturyzowaną i uporządkowaną</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Typ osobowości (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Otwartość — Ciekawski, kreatywny, lubi nowe pomysły</option>
            <option value="C">📌 Sumienność — Zorganizowany, odpowiedzialny i niezawodny</option>
            <option value="E">😊 Ekstrawersja — Czerpie energię ze środowisk społecznych</option>
            <option value="A">💛 Ugodowość — Pomocny, kooperatywny i empatyczny</option>
            <option value="N">🛡 Neurotyczność — Ostrożny, wrażliwy na ryzyko, dbający o szczegóły</option>
          </select>
        </div>

        <div class="gold-divider"></div>
        <button type="submit" class="submit-btn">Odkryj swój zawód przyszłości →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Wyniki są w języku koreańskim — użyj automatycznego tłumaczenia Chrome.
      </p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Podaj prawidłowy rok urodzenia (np. 2005).';
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5, lang: 'pl'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

<body>

        <a class="lang-btn" href="https://www.futurejob.site/pl/">🇵🇱 PL</a>
        <a class="lang-btn" href="https://www.futurejob.site/tr/">🇹🇷 TR</a>

        <a class="lang-btn" href="https://www.futurejob.site/id/">🇮🇩 ID</a>
        <a class="lang-btn" href="https://www.futurejob.site/th/">🇹🇭 TH</a>
        <a class="lang-btn" href="https://www.futurejob.site/ar/">🇦🇪 AR</a>
        <a class="lang-btn" href="https://www.futurejob.site/zh/">🇨🇳 ZH</a>
      
      </div>
    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Zukunftsberufe Empfehlung</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Deinen Namen eingeben" required>
        </div>

        <div class="field">
          <label for="dob">Geburtsjahr <span style="font-weight:400;color:#64748b">: bestimmt den Berufseinstiegszeitraum</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="z. B. 2005" required>
        </div>

        <div class="field">
          <label for="country">Zielland</label>
          <select id="country" name="country">
            <option value="독일">🇩🇪 Deutschland</option>
            <option value="미국">🇺🇸 USA</option>
            <option value="영국">🇬🇧 Vereinigtes Königreich</option>
            <option value="캐나다">🇨🇦 Kanada</option>
            <option value="호주">🇦🇺 Australien</option>
            <option value="프랑스">🇫🇷 Frankreich</option>
            <option value="이탈리아">🇮🇹 Italien</option>
            <option value="스위스">🇨🇭 Schweiz</option>
            <option value="폴란드">🇵🇱 Polen</option>
            <option value="싱가포르">🇸🇬 Singapur</option>
            <option value="일본">🇯🇵 Japan</option>
            <option value="중국">🇨🇳 China</option>
            <option value="인도">🇮🇳 Indien</option>
            <option value="베트남">🇻🇳 Vietnam</option>
            <option value="태국">🇹🇭 Thailand</option>
            <option value="인도네시아">🇮🇩 Indonesien</option>
            <option value="아랍에미리트">🇦🇪 Vereinigte Arabische Emirate</option>
            <option value="사우디아라비아">🇸🇦 Saudi-Arabien</option>
            <option value="이스라엘">🇮🇱 Israel</option>
            <option value="튀르키예">🇹🇷 Türkei</option>
            <option value="멕시코">🇲🇽 Mexiko</option>
            <option value="브라질">🇧🇷 Brasilien</option>
            <option value="남아프리카공화국">🇿🇦 Südafrika</option>
            <option value="나이지리아">🇳🇬 Nigeria</option>
            <option value="러시아">🇷🇺 Russland</option>
            <option value="대한민국">🇰🇷 Südkorea</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Bildungsplan <span style="font-weight:400;color:#64748b">: Intelligenz, Fleiß & Noten berücksichtigen</span></label>
          <select id="ability" name="ability">
            <option value="상">Master / Promotion geplant (Jg. 2000–2029)</option>
            <option value="중">Bachelor / Hochschule geplant (Jg. 2004–2033)</option>
            <option value="하">Berufsschule / Ausbildung geplant (Jg. 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Berufsinteresse (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Praktisch — Ich arbeite gerne mit Maschinen und Werkzeug</option>
            <option value="I">🔬 Forschend — Ich liebe Daten, Wissenschaft & Problemlösung</option>
            <option value="A">🎨 Künstlerisch — Ich drücke mich durch Design & Kreativität aus</option>
            <option value="S">🤝 Sozial — Ich helfe gerne und arbeite mit Menschen zusammen</option>
            <option value="E">🚀 Unternehmerisch — Führung, Überzeugung & Ziele liegen mir</option>
            <option value="C">📋 Ordnend — Ich arbeite strukturiert, genau und regelkonform</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Persönlichkeitstyp (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Offen — Neugierig, kreativ, liebt neue Ideen & Veränderungen</option>
            <option value="C">📌 Gewissenhaft — Zielorientiert, verantwortungsbewusst, zuverlässig</option>
            <option value="E">😊 Extravertiert — Gewinnt Energie aus sozialen Situationen</option>
            <option value="A">💛 Verträglich — Hilfsbereit, kooperativ und einfühlsam</option>
            <option value="N">🛡 Neurotisch — Vorsichtig, risikoempfindlich, detailbewusst</option>
          </select>
        </div>
        <div class="gold-divider"></div>

        
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:10px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Ergebnisse auf Koreanisch — bitte Chrome-Übersetzung verwenden.
      </p>
        <button type="submit" class="submit-btn">Meinen Zukunftsberuf entdecken →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Bitte gib ein gültiges Geburtsjahr ein (z. B. 2005).';
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5,
        lang:    'de'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5,
        lang: 'de'
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

<script>
  // 언어 버튼 스크롤 항상 맨 왼쪽 고정
  document.addEventListener('DOMContentLoaded', function() {
    var sw = document.querySelector('.lang-switcher');
    if (sw) { sw.scrollLeft = 0; }
  });
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI에게 물어 보기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f1f5f9; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 480px; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h4 { font-size: 20px; color: #1e293b; margin: 0; font-weight: 700; }
    .card { background: #ffffff; padding: 24px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .card p { text-align: center; } /* 문구 중앙 정렬 */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .ai-btn { 
      width: 100%; padding: 14px 16px; font-size: 14px; font-weight: bold; color: #fff; 
      border-radius: 12px; cursor: pointer; text-decoration: none; 
      display: flex; justify-content: center; align-items: center; gap: 8px; box-sizing: border-box; 
    }
    .ai-btn span { font-weight: normal; font-size: 13px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h4>AI에게 물어 보기</h4></div>
    <div class="card">
      <p style="margin:0 0 16px 0; font-size:14px; font-weight:bold; color:#334155; line-height:1.6;">궁금한 점은, 아래의 AI 중 본인이 가입한 모델을 눌러 문의</p>
      <div class="btn-group">
        <a href="https://chat.openai.com" target="_blank" class="ai-btn" style="background:#10a37f;">ChatGPT&nbsp; <span>창작 · 글쓰기 · 대화</span></a>
        <a href="https://gemini.google.com" target="_blank" class="ai-btn" style="background:#4285f4;">Gemini&nbsp; <span>구글 연동 · 코딩</span></a>
        <a href="https://claude.ai" target="_blank" class="ai-btn" style="background:#d97706;">Claude&nbsp; <span>심층 분석 · DATA 구축 · 문서 작성</span></a>
        <a href="https://www.perplexity.ai" target="_blank" class="ai-btn" style="background:#6366f1;">Perplexity&nbsp; <span>정보검색 · 최신 웹 요약</span></a>
        <a href="https://grok.com" target="_blank" class="ai-btn" style="background:#1d9bf0;">Grok&nbsp; <span>심층 질문 · 뉴스 분석</span></a>
        <a href="https://chat.deepseek.com" target="_blank" class="ai-btn" style="background:#e53e3e;">DeepSeek&nbsp; <span>코딩 · 논리 추론</span></a>
      </div>
    </div>
  </div>
</body>
</html>

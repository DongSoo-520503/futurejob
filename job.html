<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직업 상세 | FutureJob</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <meta name="description" content="미래 직업 상세 정보">
  <meta name="author" content="FutureJob">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="직업 상세 | FutureJob">
  <meta property="og:description" content="미래 직업 상세 정보">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://www.futurejob.site/kdsimage.png">
  <meta property="og:url" content="https://www.futurejob.site/job.html">
  <link rel="canonical" href="https://www.futurejob.site/job.html">

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T9440GDLT7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T9440GDLT7');
  </script>

  <!-- JSON-LD -->
  <script id="jsonld-schema" type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebPage","name":"직업 상세 | FutureJob"}
  </script>

  <style>
    .gold-divider { position: relative; height: 1px; border-radius: 2px; background: linear-gradient(90deg, transparent 0%, #b8860b 20%, #ffd700 50%, #b8860b 80%, transparent 100%); margin: 12px 0; overflow: hidden; }
    .gold-divider::after { content: ''; position: absolute; top: 0; left: -60%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent); animation: goldShimmer 1.8s ease-in-out infinite; }
    @keyframes goldShimmer { 0% { left: -60%; } 100% { left: 160%; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">직업 상세 정보</h1>
      <div class="gold-divider"></div>
    </div>

    <div id="jobDetailContent">
      <div class="empty-box"><p>직업 정보를 불러오는 중입니다...</p></div>
    </div>
  </div>

  <script>
    // ==================== 유틸리티 함수 ====================
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ==================== IndexedDB 설정 (result.html과 동일) ====================
    const DB_NAME = "JobRecommenderDB";
    const STORE_NAME = "results";
    const KEY_LATEST = "latest_result";
    const KEY_SECOND = "latest_second_candidates";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error || new Error("IndexedDB 열기 실패"));
      });
    }

    async function getFromDB(key) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readonly");
          const store = tx.objectStore(STORE_NAME);
          const req = store.get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      } catch (err) {
        console.error("IndexedDB 조회 오류:", err);
        return null;
      }
    }

    // ==================== 메타 태그 업데이트 ====================
    function updateMeta(jobName, description, country) {
      document.title = `${jobName || '직업 상세'} | FutureJob`;
      let metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) {
        metaDesc.setAttribute('content', description ? description.slice(0, 150) : `${jobName} 직업 상세 정보 - 미래 유망 직업`);
      }
      
      // Open Graph 업데이트
      let ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute('content', `${jobName} | FutureJob`);
      let ogDesc = document.querySelector('meta[property="og:description"]');
      if (ogDesc) ogDesc.setAttribute('content', description ? description.slice(0, 150) : `${jobName} 직업 정보`);
      
      let jsonldScript = document.getElementById('jsonld-schema');
      if (jsonldScript && jobName) {
        jsonldScript.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "Article",
          "name": `${jobName} 직업 상세`,
          "description": description ? description.slice(0, 150) : `${jobName} 직업 정보`
        });
      }

      // GA4 이벤트
      if (typeof gtag !== 'undefined') {
        gtag('event', 'view_job_detail', { country: country || 'unknown', job: jobName });
      }
    }

    // ==================== 직업 상세 렌더링 ====================
    async function loadAndDisplayJob() {
      const params = new URLSearchParams(window.location.search);
      const requestedCountry = params.get('country');
      const requestedJob = params.get('job');

      const contentDiv = document.getElementById('jobDetailContent');

      if (!requestedCountry || !requestedJob) {
        contentDiv.innerHTML = `
          <div class="empty-box">
            <p>직업 정보가 없습니다.</p>
            <a href="index.html" class="back-btn">← 다시 입력하기</a>
          </div>`;
        return;
      }

      try {
        // 1. IndexedDB에서 저장된 결과와 후보군 가져오기
        const latestResult = await getFromDB(KEY_LATEST);
        const secondCandidates = await getFromDB(KEY_SECOND);

        let job = null;
        let country = requestedCountry;
        let source = 'candidates'; // 데이터 출처 표시용

        // 2. 후보군에서 먼저 찾기 (성향 매칭된 직업들)
        if (secondCandidates && Array.isArray(secondCandidates) && secondCandidates.length > 0) {
          job = secondCandidates.find(row => row['추천직업'] === requestedJob);
          if (job) {
            country = job['국가'] || requestedCountry;
          }
        }

        // 3. 후보군에 없으면 latest_result의 직업인지 확인
        if (!job && latestResult && latestResult.job === requestedJob) {
          // latest_result에는 상세 정보가 충분히 들어있음
          job = {
            '추천직업': latestResult.job,
            '직업분류': latestResult.jobCategory,
            '직업해설': latestResult.description,
            '핵심전문지식': latestResult.knowledge,
            '추천학과/전공': latestResult.major,
            '준비기간': latestResult.prepPeriod,
            '시기': latestResult.period,
            '연봉순위': latestResult.salaryRank,
            '직업등급': latestResult.ability,
            'RIASEC': latestResult.riasec,
            'BIG5': latestResult.big5,
            '국가': latestResult.country
          };
          country = latestResult.country;
        }

        // 4. 그래도 없으면 데이터 파일에서 직접 로드 (백업)
        if (!job) {
          // countryFileMap 정의
          const countryFileMap = {
            '대한민국': 'korea.json', '미국': 'usa.json', '일본': 'japan.json',
            '독일': 'germany.json', '캐나다': 'canada.json', '호주': 'australia.json',
            '싱가포르': 'singapore.json', '영국': 'uk.json', '중국': 'china.json',
            '인도': 'india.json', '베트남': 'vietnam.json', '태국': 'thailand.json',
            '인도네시아': 'indonesia.json', '아랍에미리트': 'uae.json', '사우디아라비아': 'saudi.json',
            '이스라엘': 'israel.json', '프랑스': 'france.json', '이탈리아': 'italy.json',
            '스위스': 'switzerland.json', '튀르키예': 'turkey.json', '폴란드': 'poland.json',
            '멕시코': 'mexico.json', '브라질': 'brazil.json', '남아프리카공화국': 'southafrica.json',
            '나이지리아': 'nigeria.json', '러시아': 'russia.json'
          };
          
          const fileName = countryFileMap[requestedCountry];
          if (fileName) {
            const res = await fetch(`./data/${fileName}`);
            if (res.ok) {
              const jobData = await res.json();
              job = jobData.find(row => row['추천직업'] === requestedJob);
            }
          }
        }

        if (!job) {
          contentDiv.innerHTML = `
            <div class="empty-box">
              <p>직업 정보를 찾을 수 없습니다.<br>
              <small style="color:#64748b;">요청: ${escapeHtml(requestedCountry)} / ${escapeHtml(requestedJob)}</small></p>
              <a href="javascript:history.back()" class="back-btn">← 이전 페이지로 돌아가기</a>
              <a href="index.html" class="back-btn" style="margin-top:10px;">← 다시 입력하기</a>
            </div>`;
          return;
        }

        // 메타 정보 업데이트
        updateMeta(job['추천직업'], job['직업해설'], country);

        // 직업 등급 텍스트 변환
        const gradeText = {
          '상': '석박사 이상 예정',
          '중': '대학/대학원 예정',
          '하': '전문대/직업고 예정'
        }[job['직업등급']] || job['직업등급'] || '-';

        // RIASEC, Big5 표시용 라벨
        const riasecLabel = {
          'R': '🔧 만들고 조작', 'I': '🔬 파고들고 연구', 'A': '🎨 만들고 표현',
          'S': '🤝 돕고 함께', 'E': '🚀 이끌고 도전', 'C': '📋 정리하고 관리'
        };
        const big5Label = {
          'O': '✨ 호기심', 'C': '📌 계획적', 'E': '😊 외향적',
          'A': '💛 배려심', 'N': '🛡 신중함'
        };

        const riasecValue = job['RIASEC'] || '-';
        const big5Value = job['BIG5'] || '-';
        
        const riasecDisplay = riasecValue.split(',').map(c => riasecLabel[c.trim()] || c.trim()).join(', ');
        const big5Display = big5Value.split(',').map(c => big5Label[c.trim()] || c.trim()).join(', ');

        contentDiv.innerHTML = `
          <div class="info-card">
            <div class="info-item"><span class="info-label">취업 국가</span><span class="info-value">${escapeHtml(country)}</span></div>
            <div class="info-item"><span class="info-label">취업 시기</span><span class="info-value">${escapeHtml(job['시기'] || '-')}</span></div>
            <div class="info-item"><span class="info-label">연봉 순위</span><span class="info-value">${escapeHtml(job['연봉순위'] || '-')}위</span></div>
            <div class="info-item"><span class="info-label">직업 등급</span><span class="info-value">${escapeHtml(gradeText)}</span></div>
          </div>

          <div class="job-card">
            <div class="section-title">추천 직업</div>
            <div class="job-name">${escapeHtml(job['추천직업'] || '')}</div>
          </div>

          <div class="section-card">
            <div class="section-title">직업 분류</div>
            <p class="section-text">${escapeHtml(job['직업분류'] || '정보 없음')}</p>
          </div>

          <div class="section-card">
            <div class="section-title">직업 해설</div>
            <p class="section-text">${escapeHtml(job['직업해설'] || '')}</p>
          </div>

          <div class="section-card">
            <div class="section-title">핵심 전문 지식</div>
            <p class="section-text">${escapeHtml(job['핵심전문지식'] || '')}</p>
          </div>

          <div class="section-card">
            <div class="section-title">추천 학과 / 전공</div>
            <p class="section-text">${escapeHtml(job['추천학과/전공'] || '')}</p>
          </div>

          <div class="section-card">
            <div class="section-title">준비 기간</div>
            <p class="section-text">${escapeHtml(job['준비기간'] || '')}</p>
          </div>

          <div class="section-card" style="border:1px solid rgba(255,215,0,0.35);background:rgba(184,134,11,0.08);">
            <div class="section-title" style="font-size:1rem;">🎯 RIASEC · Big5 매칭 정보</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;">
              <div><span style="color:#94a3b8;">RIASEC 유형:</span><br><span style="font-weight:700;color:#ffd700;">${escapeHtml(riasecDisplay || '-')}</span></div>
              <div><span style="color:#94a3b8;">Big5 유형:</span><br><span style="font-weight:700;color:#ffd700;">${escapeHtml(big5Display || '-')}</span></div>
            </div>
          </div>

          <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:20px;">
            <a href="javascript:history.back()" class="back-btn">← 이전 페이지로 돌아가기</a>
            <a href="index.html" class="back-btn">← 다시 입력하기</a>
          </div>
        `;

      } catch (err) {
        console.error('직업 정보 로드 실패:', err);
        contentDiv.innerHTML = `
          <div class="empty-box">
            <p>${escapeHtml(err.message || '직업 정보를 불러오는 중 오류가 발생했습니다.')}</p>
            <button onclick="location.reload()" class="back-btn" style="cursor:pointer;border:none;">🔄 새로고침</button>
            <a href="index.html" class="back-btn">← 다시 입력하기</a>
          </div>`;
      }
    }

    // 페이지 로드 실행
    window.addEventListener('DOMContentLoaded', loadAndDisplayJob);
  </script>
</body>
</html>

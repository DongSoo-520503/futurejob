    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0; text-align:right;">مهن المستقبل</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">
        <div class="field">
          <label for="name">الاسم الكامل</label>
          <input id="name" name="name" type="text" placeholder="أدخل اسمك" required>
        </div>
        <div class="field">
          <label for="dob">سنة الميلاد <span style="font-weight:400;color:#64748b">: لتحديد وقت دخول سوق العمل</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="مثال: 2005" required>
        </div>
        <div class="field">
          <label for="country">الدولة المستهدفة</label>
          <select id="country" name="country">
            <option value="아랍에미리트">🇦🇪 الإمارات العربية المتحدة</option>
            <option value="사우디아라비아">🇸🇦 المملكة العربية السعودية</option>
            <option value="미국">🇺🇸 الولايات المتحدة</option>
            <option value="영국">🇬🇧 المملكة المتحدة</option>
            <option value="캐나다">🇨🇦 كندا</option>
            <option value="호주">🇦🇺 أستراليا</option>
            <option value="독일">🇩🇪 ألمانيا</option>
            <option value="프랑스">🇫🇷 فرنسا</option>
            <option value="이탈리아">🇮🇹 إيطاليا</option>
            <option value="스위스">🇨🇭 سويسرا</option>
            <option value="폴란드">🇵🇱 بولندا</option>
            <option value="싱가포르">🇸🇬 سنغافورة</option>
            <option value="일본">🇯🇵 اليابان</option>
            <option value="중국">🇨🇳 الصين</option>
            <option value="인도">🇮🇳 الهند</option>
            <option value="베트남">🇻🇳 فيتنام</option>
            <option value="태국">🇹🇭 تايلاند</option>
            <option value="인도네시아">🇮🇩 إندونيسيا</option>
            <option value="이스라엘">🇮🇱 إسرائيل</option>
            <option value="튀르키예">🇹🇷 تركيا</option>
            <option value="멕시코">🇲🇽 المكسيك</option>
            <option value="브라질">🇧🇷 البرازيل</option>
            <option value="남아프리카공화국">🇿🇦 جنوب أفريقيا</option>
            <option value="나이지리아">🇳🇬 نيجيريا</option>
            <option value="러시아">🇷🇺 روسيا</option>
            <option value="대한민국">🇰🇷 كوريا الجنوبية</option>
          </select>
        </div>
        <div class="field">
          <label for="ability">الخطة الأكاديمية <span style="font-weight:400;color:#64748b">: راعِ الذكاء والجهد والدرجات</span></label>
          <select id="ability" name="ability">
            <option value="상">ماجستير / دكتوراه مخطط لها (مواليد 2000–2029)</option>
            <option value="중">بكالوريوس / جامعة مخطط لها (مواليد 2004–2033)</option>
            <option value="하">دبلوم / تعليم مهني مخطط له (مواليد 2008–2037)</option>
          </select>
        </div>
        <div class="field">
          <label for="riasec">نوع الاهتمام المهني (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 واقعي — أحب العمل بالآلات والأدوات يدوياً</option>
            <option value="I">🔬 استقصائي — أعشق البيانات والعلوم وحل المشكلات</option>
            <option value="A">🎨 فني — أعبّر عن نفسي من خلال التصميم والإبداع</option>
            <option value="S">🤝 اجتماعي — أجد معنى في مساعدة الآخرين والعمل معهم</option>
            <option value="E">🚀 مبادر — القيادة والإقناع من أبرز نقاط قوتي</option>
            <option value="C">📋 تقليدي — أفضّل العمل المنظم والمنهجي الدقيق</option>
          </select>
        </div>
        <div class="field">
          <label for="big5">نوع الشخصية (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ الانفتاح — فضولي، مبدع، يحب الأفكار الجديدة</option>
            <option value="C">📌 الضمير — منظم، مسؤول، يُنجز ما يبدأه</option>
            <option value="E">😊 الانبساطية — يستمد طاقته من البيئات الاجتماعية</option>
            <option value="A">💛 الطيبة — متعاون، متعاطف، يساعد الآخرين بطبعه</option>
            <option value="N">🛡 العصابية — حذر، حساس للمخاطر، منتبه للتفاصيل</option>
          </select>
        </div>
        <div class="gold-divider"></div>
        
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.8;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ النتائج باللغة الكورية — استخدم ميزة الترجمة التلقائية في Chrome
      </p>
        <button type="submit" class="submit-btn">اكتشف مهنتي المستقبلية ←</button>
      </form>
      <p id="formMessage" class="form-message" style="text-align:right;"></p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());
      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'يرجى إدخال سنة ميلاد صحيحة (مثال: 2005).';
        return;
      }
      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5,
        lang:    'ar'
      });
      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5,
        lang: 'ar'
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

<script>
  // 언어 버튼 스크롤 항상 맨 왼쪽 고정

    if (sw) { sw.scrollLeft = 0; }

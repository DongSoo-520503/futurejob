        <a class="lang-btn" href="https://www.futurejob.site/ar/">🇦🇪 AR</a>
        <a class="lang-btn" href="https://www.futurejob.site/zh/">🇨🇳 ZH</a>
      
      </div>
    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Métiers d'Avenir</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Prénom &amp; Nom</label>
          <input id="name" name="name" type="text" placeholder="Entrez votre nom" required>
        </div>

        <div class="field">
          <label for="dob">Année de naissance <span style="font-weight:400;color:#64748b">: détermine la période d'entrée dans la vie active</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="ex. 2005" required>
        </div>

        <div class="field">
          <label for="country">Pays cible</label>
          <select id="country" name="country">
            <option value="프랑스">🇫🇷 France</option>
            <option value="미국">🇺🇸 États-Unis</option>
            <option value="영국">🇬🇧 Royaume-Uni</option>
            <option value="캐나다">🇨🇦 Canada</option>
            <option value="호주">🇦🇺 Australie</option>
            <option value="독일">🇩🇪 Allemagne</option>
            <option value="이탈리아">🇮🇹 Italie</option>
            <option value="스위스">🇨🇭 Suisse</option>
            <option value="폴란드">🇵🇱 Pologne</option>
            <option value="싱가포르">🇸🇬 Singapour</option>
            <option value="일본">🇯🇵 Japon</option>
            <option value="중국">🇨🇳 Chine</option>
            <option value="인도">🇮🇳 Inde</option>
            <option value="베트남">🇻🇳 Vietnam</option>
            <option value="태국">🇹🇭 Thaïlande</option>
            <option value="인도네시아">🇮🇩 Indonésie</option>
            <option value="아랍에미리트">🇦🇪 Émirats arabes unis</option>
            <option value="사우디아라비아">🇸🇦 Arabie saoudite</option>
            <option value="이스라엘">🇮🇱 Israël</option>
            <option value="튀르키예">🇹🇷 Turquie</option>
            <option value="멕시코">🇲🇽 Mexique</option>
            <option value="브라질">🇧🇷 Brésil</option>
            <option value="남아프리카공화국">🇿🇦 Afrique du Sud</option>
            <option value="나이지리아">🇳🇬 Nigeria</option>
            <option value="러시아">🇷🇺 Russie</option>
            <option value="대한민국">🇰🇷 Corée du Sud</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Parcours scolaire <span style="font-weight:400;color:#64748b">: tenir compte du QI, des efforts et des notes</span></label>
          <select id="ability" name="ability">
            <option value="상">Master / Doctorat prévu (nés en 2000–2029)</option>
            <option value="중">Licence / Grande école prévue (nés en 2004–2033)</option>
            <option value="하">BTS / Lycée professionnel prévu (nés en 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Intérêt professionnel (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Réaliste — J'aime travailler avec des machines et des outils</option>
            <option value="I">🔬 Investigateur — J'adore la recherche, les données et les sciences</option>
            <option value="A">🎨 Artistique — Je m'exprime par le design, l'art et la création</option>
            <option value="S">🤝 Social — Aider les autres et travailler en équipe m'épanouit</option>
            <option value="E">🚀 Entreprenant — Leadership, persuasion et ambition me correspondent</option>
            <option value="C">📋 Conventionnel — Je préfère un travail structuré, précis et organisé</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Personnalité (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Ouverture — Curieux, imaginatif, aime les nouvelles idées</option>
            <option value="C">📌 Consciencieux — Organisé, responsable, va jusqu'au bout</option>
            <option value="E">😊 Extraverti — Épanoui dans les environnements sociaux et dynamiques</option>
            <option value="A">💛 Agréable — Naturellement serviable, coopératif et empathique</option>
            <option value="N">🛡 Névrosé — Prudent, sensible aux risques, attentif aux détails</option>
          </select>
        </div>

        <div class="gold-divider"></div>
        <button type="submit" class="submit-btn">Découvrir mon métier d'avenir →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:10px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Résultats en coréen — utilisez la traduction Chrome pour votre langue.
      </p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = "Veuillez entrer une année de naissance valide (ex. 2005).";
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5, lang: 'fr'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

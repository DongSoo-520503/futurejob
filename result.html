<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미래직업 추천결과</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h4>미래직업 추천결과</h4>
    </div>

    <div id="resultContent">
      <div class="empty-box">
        <p>결과를 불러오는 중입니다...</p>
      </div>
    </div>
  </div>

  <script>
    // ==================== 유틸리티 함수 ====================
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function toText(value) {
      if (Array.isArray(value)) return value.join(', ');
      if (value === null || value === undefined) return '';
      return String(value);
    }

    // ==================== IndexedDB 헬퍼 ====================
    const DB_NAME = "JobRecommenderDB";
    const STORE_NAME = "results";
    const KEY_LATEST = "latest_result";
    const KEY_SECOND = "latest_second_candidates";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error || new Error("IndexedDB 열기 실패"));
      });
    }

    async function saveToDB(key, value) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const store = tx.objectStore(STORE_NAME);
          store.put(value, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (err) {
        console.error("IndexedDB 저장 오류:", err);
      }
    }

    // ==================== 엑셀 생성 함수 ====================
    function normalizeStudyPlan(userInput) {
      return toText(
        userInput?.studyPlan ||
        userInput?.educationPlan ||
        userInput?.plan ||
        userInput?.abilityLabel ||
        userInput?.ability ||
        ''
      );
    }

    function normalizeRiasec(userInput) {
      return toText(
        userInput?.riasecLabel ||
        userInput?.riasecText ||
        userInput?.riasecName ||
        userInput?.riasec ||
        ''
      );
    }

    function normalizeBig5(userInput) {
      return toText(
        userInput?.big5Label ||
        userInput?.big5Text ||
        userInput?.big5Name ||
        userInput?.big5 ||
        ''
      );
    }

    function buildExcelExportInfo(userInput, fallback = {}) {
      const birthYear = toText(userInput?.dob || fallback.birthYear || '');
      const ability = toText(userInput?.abilityLabel || userInput?.ability || fallback.studyPlan || '');
      return {
        name: toText(userInput?.name || fallback.name || '사용자'),
        birthYear,
        country: toText(userInput?.country || fallback.country || ''),
        studyPlan: normalizeStudyPlan(userInput) || ability,
        period: toText(fallback.period || userInput?.period || ''),
        riasec: normalizeRiasec(userInput),
        big5: normalizeBig5(userInput)
      };
    }

    function loadExcelJs() {
      if (window.ExcelJS) return Promise.resolve(window.ExcelJS);

      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
        script.onload = () => {
          if (window.ExcelJS) resolve(window.ExcelJS);
          else reject(new Error('ExcelJS 로드에 실패했습니다.'));
        };
        script.onerror = () => reject(new Error('ExcelJS 스크립트를 불러오지 못했습니다.'));
        document.head.appendChild(script);
      });
    }

    async function buildStyledWorkbook(rows, exportInfo = {}) {
      const ExcelJS = await loadExcelJs();

      const workbook = new ExcelJS.Workbook();
      workbook.creator = 'ChatGPT';
      workbook.created = new Date();

      const ws = workbook.addWorksheet('2nd Candidates', {
        views: [{ showGridLines: true }]
      });

      ws.columns = [
        { key: 'A', width: 13.0 },
        { key: 'B', width: 10.5 },
        { key: 'C', width: 22.625 },
        { key: 'D', width: 13.0 },
        { key: 'E', width: 40.625 },
        { key: 'F', width: 31.0 },
        { key: 'G', width: 28.75 },
        { key: 'H', width: 20.0 }
      ];

      const fillBlue = {
        type: 'pattern',
        pattern: 'solid',
        fgColor: { argb: 'D9E2F3' }
      };

      const mediumBorder = {
        top: { style: 'medium', color: { argb: '7F7F7F' } },
        left: { style: 'medium', color: { argb: '7F7F7F' } },
        bottom: { style: 'medium', color: { argb: '7F7F7F' } },
        right: { style: 'medium', color: { argb: '7F7F7F' } }
      };

      const thinBorder = {
        top: { style: 'thin', color: { argb: 'BFBFBF' } },
        left: { style: 'thin', color: { argb: 'BFBFBF' } },
        bottom: { style: 'thin', color: { argb: 'BFBFBF' } },
        right: { style: 'thin', color: { argb: 'BFBFBF' } }
      };

      const topLabelStyle = {
        font: { name: '맑은 고딕', size: 12, bold: true },
        fill: fillBlue,
        border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'left', wrapText: true }
      };

      const topValueStyle = {
        font: { name: '맑은 고딕', size: 12, bold: false },
        fill: fillBlue,
        border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'left', wrapText: true }
      };

      const topEmphasisStyle = {
        font: { name: '맑은 고딕', size: 12, bold: true },
        fill: fillBlue,
        border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'left', wrapText: true }
      };

      const headerStyle = {
        font: { name: '맑은 고딕', size: 12, bold: true },
        border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'center', wrapText: true }
      };

      const bodyStyle = {
        font: { name: '맑은 고딕', size: 12, bold: false },
        border: thinBorder,
        alignment: { vertical: 'top', horizontal: 'left', wrapText: true }
      };

      const bodyCenterStyle = {
        font: { name: '맑은 고딕', size: 12, bold: false },
        border: thinBorder,
        alignment: { vertical: 'top', horizontal: 'center', wrapText: true }
      };

      const blankRow = () => ws.addRow([]);

      blankRow();
      const r2 = ws.addRow([null, '성명', exportInfo.name || '사용자', exportInfo.birthYear ? `${exportInfo.birthYear}년생` : '', null, null, null, null]);
      const r3 = ws.addRow([null, '취업국가', '학업계획', '취업 시기', '직업흥미유형 (RIASEC)', '개인 성향 (Big5)', null, null]);
      const r4 = ws.addRow([null, exportInfo.country || '', exportInfo.studyPlan || '', exportInfo.period || '', exportInfo.riasec || '', exportInfo.big5 || '', null, null]);
      blankRow();
      const r6 = ws.addRow([null, '연봉순위', '직업명', '직업분류', '직업 해설', '핵심전문지식', '추천학과/전공', '준비기간']);

      [r2, r3, r4, r6].forEach(row => row.height = 24);

      ['B2','C2','D2'].forEach(addr => Object.assign(ws.getCell(addr), { style: addr === 'B2' ? topLabelStyle : (addr === 'C2' ? topEmphasisStyle : topEmphasisStyle) }));
      ['B3','C3','D3','E3','F3'].forEach(addr => Object.assign(ws.getCell(addr), { style: topLabelStyle }));
      ['B4','C4','D4','E4','F4'].forEach(addr => Object.assign(ws.getCell(addr), { style: topValueStyle }));
      ['B6','C6','D6','E6','F6','G6','H6'].forEach(addr => Object.assign(ws.getCell(addr), { style: headerStyle }));

      rows.forEach((item) => {
        const row = ws.addRow([
          null,
          item['연봉순위'] || '',
          item['추천직업'] || '',
          item['직업분류'] || '',
          item['직업해설'] || '',
          item['핵심전문지식'] || '',
          item['추천학과/전공'] || '',
          item['준비기간'] || ''
        ]);

        row.height = 74;
        row.getCell(2).style = bodyCenterStyle;
        for (let i = 3; i <= 8; i += 1) {
          row.getCell(i).style = bodyStyle;
        }
      });

      ws.pageSetup = {
        paperSize: 9,
        orientation: 'landscape',
        fitToPage: true,
        fitToWidth: 1,
        fitToHeight: 0,
        margins: {
          left: 0.3, right: 0.3, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2
        }
      };

      ws.getColumn('A').eachCell((cell) => {
        cell.border = {};
      });

      return workbook;
    }
    // ==================== 개발자 다운로드 비밀번호 ====================
    function checkDeveloperPassword() {
      const encoded = "a2RzczUy"; // 난독화
      const password = atob(encoded);
      const input = prompt("🔐 개발자 전용 다운로드입니다.\n비밀번호를 입력하세요:");
      if (input === null) return false;
      if (input === password) return true;
      alert("비밀번호가 일치하지 않습니다.");
      return false;
    }

    async function downloadSecondCandidatesExcel(candidates, userName, birthYear, period) {
      if (!checkDeveloperPassword()) return;
      if (!candidates?.length) {
        alert('후보군 데이터가 없습니다.');
        return;
      }

      try {
        const userInput = JSON.parse(localStorage.getItem('userInput') || '{}');
        const exportInfo = buildExcelExportInfo(userInput, {
          name: userName,
          birthYear,
          period
        });

        const workbook = await buildStyledWorkbook(candidates, exportInfo);
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([
          buffer
        ], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

        const safeName = (userName || exportInfo.name || '사용자').replace(/[\\/*?:"<>|]/g, '');
        const fileName = `${safeName}_${birthYear || exportInfo.birthYear || '0000'}_${period || exportInfo.period || '시기미상'}_2차후보군.xlsx`;

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        alert(`${candidates.length}개 항목이 ${fileName}로 다운로드되었습니다.`);
      } catch (err) {
        console.error('엑셀 생성 오류:', err);
        alert('엑셀 파일 생성 중 오류가 발생했습니다. 콘솔을 확인해 주세요.');
      }
    }

    // ==================== 결과 화면 렌더링 ====================
    function displayResult(data, secondCandidates) {
      const el = document.getElementById('resultContent');
      const hasCandidates = secondCandidates?.length > 0;

      el.innerHTML = `
<div class="info-card">
  <div class="info-item"><span class="info-label">성명</span><span class="info-value">${escapeHtml(data.name)}</span></div>
  <div class="info-item"><span class="info-label">취업 국가</span><span class="info-value">${escapeHtml(data.country)}</span></div>
  <div class="info-item"><span class="info-label">취업 시기</span><span class="info-value">${escapeHtml(data.period)}</span></div>
  <div class="info-item"><span class="info-label">연봉 순위</span><span class="info-value">${escapeHtml(data.salaryRank)}위 (성향매칭 후보 ${escapeHtml(data.matchedCount || 0)}개 중)</span></div>
</div>

<div class="job-card">
  <div class="section-title">추천 직업</div>
  <div class="job-name">${escapeHtml(data.job)}</div>
</div>

<div class="section-card">
  <div class="section-title">직업 분류</div>
  <p class="section-text">${escapeHtml(data.jobCategory || '정보 없음')}</p>
</div>

<div class="section-card">
  <div class="section-title">직업 해설</div>
  <p class="section-text">${escapeHtml(data.description || '')}</p>
</div>

<div class="section-card">
  <div class="section-title">핵심 전문 지식</div>
  <p class="section-text">${escapeHtml(data.knowledge || '')}</p>
</div>

<div class="section-card">
  <div class="section-title">추천 학과 / 전공</div>
  <p class="section-text">${escapeHtml(data.major || '')}</p>
</div>

<div class="section-card">
  <div class="section-title">준비 기간</div>
  <p class="section-text">${escapeHtml(data.prepPeriod || '')}</p>
</div>

<div class="process-card">
  <div class="process-title">추천 산출 과정</div>
  <div class="process-step">
    <div class="step-num">1</div>
    <div class="step-content">
      <div class="step-label">조건 필터링</div>
      <p class="step-text">국가, 시기, 학업 계획 기준으로 ${escapeHtml(data.firstCount || 0)}개 추출</p>
    </div>
  </div>
  <div class="process-step">
    <div class="step-num">2</div>
    <div class="step-content">
      <div class="step-label">성향 매칭</div>
      <p class="step-text">RIASEC과 Big5 <strong>둘 다</strong> 일치하는 <strong>${escapeHtml(data.matchedCount || 0)}개</strong> 선별</p>
    </div>
  </div>
  <div class="process-step">
    <div class="step-num">3</div>
    <div class="step-content">
      <div class="step-label">최종 추천</div>
      <p class="step-text">매칭된 후보 중 연봉순위 가장 높은 직업 1개 선택</p>
    </div>
  </div>
</div>

<a href="index.html" class="back-btn">← 다시 입력하기</a>

<div class="download-wrap">
  <button id="downloadBtn" class="download-btn" ${hasCandidates ? '' : 'disabled'}>
    🔒 성향매칭 ${escapeHtml(data.matchedCount || 0)}개 전체 다운로드(비밀번호)
  </button>

  <button class="download-btn" style="margin-top:10px; background-color:#475569; color:#fff;" 
          onclick="window.open('AI.html')">
     모르는 용어,문장 AI앞 문의하기  </button>
  
  <button class="download-btn" style="margin-top:10px; background-color:#fee500; color:#000;" 
          onclick="window.open('https://open.kakao.com/o/g6YIdfmi')">
    개발자앞 직접문의(카톡오픈채팅)
  </button>
</div>`;

// 이벤트 리스너가 정상 작동하도록 기존 로직 유지
if (hasCandidates) {
  document.getElementById('downloadBtn')?.addEventListener('click', () => {
    downloadSecondCandidatesExcel(secondCandidates, data.name, data.dob, data.period);
  });
}
    }

    // ==================== 메인 로직 ====================
    async function loadAndDisplayResult() {
      const el = document.getElementById('resultContent');
      const userInput = JSON.parse(localStorage.getItem('userInput'));

      if (!userInput) {
        el.innerHTML = '<div class="empty-box"><p>입력 정보가 없습니다.</p><a href="index.html" class="back-btn">← 다시 입력하기</a></div>';
        return;
      }

      try {
        const countryFileMap = {
         '대한민국': 'KR.json',
         '미국': 'US.json',
         '일본': 'JP.json',
         '독일': 'DE.json',
         '캐나다': 'CA.json',
         '호주': 'AU.json',
         '싱가포르': 'SG.json',
         '영국': 'UK.json',
         '중국': 'CN.json',
         '인도': 'IN.json',
         '베트남': 'VN.json',
         '태국': 'TH.json',
         '인도네시아': 'ID.json',
         '아랍에미리트': 'AE.json',
         '사우디아라비아': 'SA.json',
         '이스라엘': 'IL.json',
         '프랑스': 'FR.json',
         '이탈리아': 'IT.json',
         '스위스': 'CH.json',
         '튀르키예': 'TR.json',
         '폴란드': 'PL.json',
         '멕시코': 'MX.json',
         '브라질': 'BR.json',
         '남아프리카공화국': 'ZA.json',
         '나이지리아': 'NG.json',
         '러시아': 'RU.json'
        };

        const country = String(userInput.country || '').trim();
        const fileName = countryFileMap[country];
        if (!fileName) throw new Error('국가 데이터 파일을 찾을 수 없습니다.');

        const res = await fetch(`./data/${fileName}`);
        if (!res.ok) throw new Error(`데이터 로드 실패: ${res.status}`);
        const jobData = await res.json();

        const riasecList = [userInput.riasec].filter(Boolean);
        const big5List   = [userInput.big5].filter(Boolean);

        if (!riasecList.length || !big5List.length) {
          throw new Error('RIASEC 또는 BIG5 유형이 선택되지 않았습니다.');
        }

        const birthYear = parseInt(userInput.dob, 10);
        const addYear = userInput.ability === '상' ? 30 : userInput.ability === '중' ? 26 : 22;
        const period = `${Math.floor((birthYear + addYear) / 10) * 10}년대`;

        // 1차 후보군
        const firstCandidates = jobData.filter(row =>
          String(row['국가'] || '').trim() === country &&
          row['시기'] === period &&
          row['직업등급'] === userInput.ability
        );

        if (!firstCandidates.length) {
          throw new Error(`'${period}' 시기 데이터가 없습니다.`);
        }

        // 2차 후보군 : RIASEC + BIG5 둘 다 매칭
        const matchedCandidates = firstCandidates.filter(row => {
          const rCodes = (row['RIASEC'] || '').split(',').map(s => s.trim()).filter(Boolean);
          const bCodes = (row['BIG5']   || '').split(',').map(s => s.trim()).filter(Boolean);

          const riasecMatch = riasecList.some(code => rCodes.includes(code));
          const big5Match   = big5List.some(code   => bCodes.includes(code));

          return riasecMatch && big5Match;
        });

        if (!matchedCandidates.length) {
          matchedCandidates.push(firstCandidates[0]); // fallback
        }

        // 연봉순위 오름차순 정렬 (작을수록 높음)
        matchedCandidates.sort((a, b) =>
          parseInt(a['연봉순위'] || 9999, 10) - parseInt(b['연봉순위'] || 9999, 10)
        );

        const best = matchedCandidates[0];

        const result = {
          name: userInput.name,
          country,
          dob: userInput.dob,
          period,
          job: best['추천직업'] || '',
          salaryRank: best['연봉순위'] || '',
          description: best['직업해설'] || '',
          knowledge: best['핵심전문지식'] || '',
          major: best['추천학과/전공'] || '',
          prepPeriod: best['준비기간'] || '',
          jobCategory: best['직업분류'] || '정보 없음',          // ← 추가된 부분
          firstCount: firstCandidates.length,
          matchedCount: matchedCandidates.length
        };

        localStorage.setItem('jobResult', JSON.stringify(result));
        await saveToDB(KEY_LATEST, result);
        await saveToDB(KEY_SECOND, matchedCandidates);

        displayResult(result, matchedCandidates);

      } catch (err) {
        console.error(err);
        el.innerHTML = `<div class="empty-box"><p>${escapeHtml(err.message)}</p><a href="index.html" class="back-btn">← 다시 입력하기</a></div>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadAndDisplayResult);
  </script>
</body>
</html>

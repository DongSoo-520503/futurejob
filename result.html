<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미래직업 추천결과</title>
  <meta name="description" content="개인 입력값을 바탕으로 산출된 미래직업 추천 결과 페이지">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T9440GDLT7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T9440GDLT7');
  </script>

  <!-- html2canvas: 결과 카드 이미지 저장 (STEP 4) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>
<body>

  <!-- ══ 공유용 이미지 카드 — 캡처 전용, 화면 밖 (STEP 4) ══ -->
  <div id="shareCard" style="
    position:fixed; left:-9999px; top:0; visibility:hidden;
    width:540px; padding:36px 32px 28px;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
    font-family:'Noto Sans KR',sans-serif; color:#e2e8f0;
    border-radius:20px; box-sizing:border-box;
  ">
    <div style="font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;">
      FutureJob · futurejob.site
    </div>
    <div id="sc_name"  style="font-size:13px;color:#94a3b8;margin-bottom:4px;"></div>
    <div id="sc_job"   style="font-size:28px;font-weight:700;color:#f1f5f9;line-height:1.3;margin-bottom:14px;"></div>
    <div id="sc_meta"  style="font-size:12px;color:#64748b;margin-bottom:16px;"></div>
    <div id="sc_desc"  style="font-size:13px;color:#cbd5e1;line-height:1.6;border-top:1px solid #334155;padding-top:14px;margin-bottom:18px;"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;" id="sc_tags"></div>
    <div style="margin-top:20px;font-size:11px;color:#475569;text-align:right;">
      AI 미래 직업 추천 · futurejob.site
    </div>
  </div>

  <div class="container">
    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">미래직업 추천결과</h1>
      <p style="font-size:0.78rem; color:#94a3b8; margin-top:2px; text-align:center; line-height:1.4;">AI(Claude Pro)가 각국의 사정을 감안하여 추정한 것입니다.<br>미래가 불확실하다는 점도 잊지 마세요.
      </p>
    </div>

    <div id="resultContent">
      <div class="empty-box">
        <p>결과를 불러오는 중입니다...</p>
      </div>
    </div>
  </div>

  <script>
    // ==================== 유틸리티 함수 ====================
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function toText(value) {
      if (Array.isArray(value)) return value.join(', ');
      if (value === null || value === undefined) return '';
      return String(value);
    }

    function updateResultMeta(data) {
      const title = `${data.job || '미래직업 추천결과'} | FutureJob`;
      document.title = title;

      const descText = data.description && String(data.description).trim()
        ? String(data.description).trim().slice(0, 140)
        : '개인 입력값을 바탕으로 산출된 미래직업 추천 결과 페이지';

      let descMeta = document.querySelector('meta[name="description"]');
      if (descMeta) descMeta.setAttribute('content', descText);

      let robotsMeta = document.querySelector('meta[name="robots"]');
      if (robotsMeta) robotsMeta.setAttribute('content', 'noindex, nofollow, noarchive');
    }

    // ==================== IndexedDB 헬퍼 ====================
    const DB_NAME = "JobRecommenderDB";
    const STORE_NAME = "results";
    const KEY_LATEST = "latest_result";
    const KEY_SECOND = "latest_second_candidates";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error || new Error("IndexedDB 열기 실패"));
      });
    }

    async function saveToDB(key, value) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const store = tx.objectStore(STORE_NAME);
          store.put(value, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (err) {
        console.error("IndexedDB 저장 오류:", err);
      }
    }

    // ==================== 엑셀 생성 함수 ====================
    function normalizeStudyPlan(userInput) {
      return toText(
        userInput?.studyPlan ||
        userInput?.educationPlan ||
        userInput?.plan ||
        userInput?.abilityLabel ||
        userInput?.ability ||
        ''
      );
    }

    function normalizeRiasec(userInput) {
      return toText(
        userInput?.riasecLabel ||
        userInput?.riasecText ||
        userInput?.riasecName ||
        userInput?.riasec ||
        ''
      );
    }

    function normalizeBig5(userInput) {
      return toText(
        userInput?.big5Label ||
        userInput?.big5Text ||
        userInput?.big5Name ||
        userInput?.big5 ||
        ''
      );
    }

    function buildExcelExportInfo(userInput, fallback = {}) {
      const birthYear = toText(userInput?.dob || fallback.birthYear || '');
      const ability = toText(userInput?.abilityLabel || userInput?.ability || fallback.studyPlan || '');
      return {
        name: toText(userInput?.name || fallback.name || '사용자'),
        birthYear,
        country: toText(userInput?.country || fallback.country || ''),
        studyPlan: normalizeStudyPlan(userInput) || ability,
        period: toText(fallback.period || userInput?.period || ''),
        riasec: normalizeRiasec(userInput),
        big5: normalizeBig5(userInput)
      };
    }

    function loadExcelJs() {
      if (window.ExcelJS) return Promise.resolve(window.ExcelJS);
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
        script.onload = () => {
          if (window.ExcelJS) resolve(window.ExcelJS);
          else reject(new Error('ExcelJS 로드에 실패했습니다.'));
        };
        script.onerror = () => reject(new Error('ExcelJS 스크립트를 불러오지 못했습니다.'));
        document.head.appendChild(script);
      });
    }

    async function buildStyledWorkbook(rows, exportInfo = {}) {
      const ExcelJS = await loadExcelJs();

      const workbook = new ExcelJS.Workbook();
      workbook.creator = 'FutureJob';
      workbook.created = new Date();

      const ws = workbook.addWorksheet('2nd Candidates', {
        views: [{ showGridLines: true }]
      });

      ws.columns = [
        { key: 'A', width: 13.0 },
        { key: 'B', width: 10.5 },
        { key: 'C', width: 22.625 },
        { key: 'D', width: 13.0 },
        { key: 'E', width: 40.625 },
        { key: 'F', width: 31.0 },
        { key: 'G', width: 28.75 },
        { key: 'H', width: 20.0 }
      ];

      const fillBlue = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'D9E2F3' } };
      const mediumBorder = {
        top: { style: 'medium', color: { argb: '7F7F7F' } },
        left: { style: 'medium', color: { argb: '7F7F7F' } },
        bottom: { style: 'medium', color: { argb: '7F7F7F' } },
        right: { style: 'medium', color: { argb: '7F7F7F' } }
      };
      const thinBorder = {
        top: { style: 'thin', color: { argb: 'BFBFBF' } },
        left: { style: 'thin', color: { argb: 'BFBFBF' } },
        bottom: { style: 'thin', color: { argb: 'BFBFBF' } },
        right: { style: 'thin', color: { argb: 'BFBFBF' } }
      };
      const topLabelStyle = {
        font: { name: '맑은 고딕', size: 12, bold: true }, fill: fillBlue, border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'left', wrapText: true }
      };
      const topValueStyle = {
        font: { name: '맑은 고딕', size: 12, bold: false }, fill: fillBlue, border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'left', wrapText: true }
      };
      const topEmphasisStyle = {
        font: { name: '맑은 고딕', size: 12, bold: true }, fill: fillBlue, border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'left', wrapText: true }
      };
      const headerStyle = {
        font: { name: '맑은 고딕', size: 12, bold: true }, border: mediumBorder,
        alignment: { vertical: 'middle', horizontal: 'center', wrapText: true }
      };
      const bodyStyle = {
        font: { name: '맑은 고딕', size: 12, bold: false }, border: thinBorder,
        alignment: { vertical: 'top', horizontal: 'left', wrapText: true }
      };
      const bodyCenterStyle = {
        font: { name: '맑은 고딕', size: 12, bold: false }, border: thinBorder,
        alignment: { vertical: 'top', horizontal: 'center', wrapText: true }
      };

      const blankRow = () => ws.addRow([]);

      blankRow();
      const r2 = ws.addRow([null, '성명', exportInfo.name || '사용자', exportInfo.birthYear ? `${exportInfo.birthYear}년생` : '', null, null, null, null]);
      const r3 = ws.addRow([null, '취업국가', '학업계획', '취업 시기', '직업흥미유형 (RIASEC)', '개인 성향 (Big5)', null, null]);
      const r4 = ws.addRow([null, exportInfo.country || '', exportInfo.studyPlan || '', exportInfo.period || '', exportInfo.riasec || '', exportInfo.big5 || '', null, null]);
      blankRow();
      const r6 = ws.addRow([null, '연봉순위', '직업명', '직업분류', '직업 해설', '핵심전문지식', '추천학과/전공', '준비기간']);

      [r2, r3, r4, r6].forEach(row => row.height = 24);

      ['B2','C2','D2'].forEach(addr => Object.assign(ws.getCell(addr), { style: addr === 'B2' ? topLabelStyle : topEmphasisStyle }));
      ['B3','C3','D3','E3','F3'].forEach(addr => Object.assign(ws.getCell(addr), { style: topLabelStyle }));
      ['B4','C4','D4','E4','F4'].forEach(addr => Object.assign(ws.getCell(addr), { style: topValueStyle }));
      ['B6','C6','D6','E6','F6','G6','H6'].forEach(addr => Object.assign(ws.getCell(addr), { style: headerStyle }));

      rows.forEach((item) => {
        const row = ws.addRow([
          null,
          item['연봉순위'] || '',
          item['추천직업'] || '',
          item['직업분류'] || '',
          item['직업해설'] || '',
          item['핵심전문지식'] || '',
          item['추천학과/전공'] || '',
          item['준비기간'] || ''
        ]);
        row.height = 74;
        row.getCell(2).style = bodyCenterStyle;
        for (let i = 3; i <= 8; i++) row.getCell(i).style = bodyStyle;
      });

      ws.pageSetup = {
        paperSize: 9, orientation: 'landscape', fitToPage: true,
        fitToWidth: 1, fitToHeight: 0,
        margins: { left: 0.3, right: 0.3, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2 }
      };
      ws.getColumn('A').eachCell((cell) => { cell.border = {}; });

      return workbook;
    }

    // ==================== 개발자 다운로드 비밀번호 ====================
    function checkDeveloperPassword() {
      const encoded = "a2RzczUy";
      const password = atob(encoded);
      const input = prompt("🔐 개발자 전용 다운로드입니다.\n비밀번호를 입력하세요:");
      if (input === null) return false;
      if (input === password) return true;
      alert("비밀번호가 일치하지 않습니다.");
      return false;
    }

    async function downloadSecondCandidatesExcel(candidates, userName, birthYear, period) {
      if (!checkDeveloperPassword()) return;
      if (!candidates?.length) { alert('후보군 데이터가 없습니다.'); return; }

      try {
        const userInput = JSON.parse(localStorage.getItem('futureJob_userInput') || '{}');
        const exportInfo = buildExcelExportInfo(userInput, { name: userName, birthYear, period });
        const workbook = await buildStyledWorkbook(candidates, exportInfo);
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

        const safeName = (userName || exportInfo.name || '사용자').replace(/[\\/*?:"<>|]/g, '');
        const fileName = `${safeName}_${birthYear || exportInfo.birthYear || '0000'}_${period || exportInfo.period || '시기미상'}_2차후보군.xlsx`;

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        alert(`${candidates.length}개 항목이 ${fileName}로 다운로드되었습니다.`);
      } catch (err) {
        console.error('엑셀 생성 오류:', err);
        alert('엑셀 파일 생성 중 오류가 발생했습니다. 콘솔을 확인해 주세요.');
      }
    }

    // ==================== 결과 이미지 카드 저장 (STEP 4) ====================
    function fillShareCard(result) {
      const riasecLabel = {
        R:'🔧 만들고 조작', I:'🔬 파고들고 연구', A:'🎨 만들고 표현',
        S:'🤝 돕고 함께',  E:'🚀 이끌고 도전',  C:'📋 정리하고 관리'
      };
      const big5Label = {
        O:'✨ 호기심', C:'📌 계획적', E:'😊 외향적', A:'💛 배려심', N:'🛡 신중함'
      };

      document.getElementById('sc_name').textContent = `${result.name || ''}의 미래 직업`;
      document.getElementById('sc_job').textContent  = result.job || '';
      document.getElementById('sc_meta').textContent =
        `${result.country} · ${result.period} · 연봉순위 ${result.salaryRank || '-'}위`;

      const fullDesc = result.description || '';
      document.getElementById('sc_desc').textContent =
        fullDesc.slice(0, 80) + (fullDesc.length > 80 ? '…' : '');

      const tags = [];
      if (result.riasec) tags.push(riasecLabel[result.riasec] || result.riasec);
      if (result.big5)   tags.push(big5Label[result.big5]     || result.big5);
      document.getElementById('sc_tags').innerHTML = tags.map(t =>
        `<span style="background:#1e3a5f;color:#93c5fd;border-radius:20px;
          padding:4px 12px;font-size:11px;">${t}</span>`
      ).join('');
    }

    async function downloadShareCard(result) {
      const btn = document.getElementById('shareCardBtn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ 생성 중...'; }

      try {
        fillShareCard(result);
        const card = document.getElementById('shareCard');
        card.style.left = '-9999px';
        card.style.visibility = 'visible';
        await new Promise(r => setTimeout(r, 150));

        const canvas = await html2canvas(card, {
          scale: 2, useCORS: true, backgroundColor: null, logging: false
        });
        card.style.visibility = 'hidden';

        const link = document.createElement('a');
        link.download = `미래직업_${result.job || 'card'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error('카드 저장 실패:', err);
        alert('이미지 저장에 실패했습니다. 다시 시도해 주세요.');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '📷 내 직업카드 이미지 저장'; }
      }
    }

    // ==================== 결과 화면 렌더링 ====================
    function displayResult(data, secondCandidates) {
      updateResultMeta(data);

      const el = document.getElementById('resultContent');
      const hasCandidates = secondCandidates?.length > 0;

      el.innerHTML = `
<div class="info-card">
  <div class="info-item"><span class="info-label">성명</span><span class="info-value">${escapeHtml(data.name)}</span></div>
  <div class="info-item"><span class="info-label">취업 국가</span><span class="info-value">${escapeHtml(data.country)}</span></div>
  <div class="info-item"><span class="info-label">취업 시기</span><span class="info-value">${escapeHtml(data.period)}</span></div>
  <div class="info-item"><span class="info-label">연봉 순위</span><span class="info-value">${escapeHtml(data.salaryRank)}위 (성향매칭 후보 ${escapeHtml(data.matchedCount || 0)}개 중)</span></div>
</div>

<div class="job-card">
  <div class="section-title">추천 직업</div>
  <div class="job-name">
    <a href="job.html?country=${encodeURIComponent(data.country)}&job=${encodeURIComponent(data.job)}"
       style="color:#e2e8f0; text-decoration:none; font-weight:700;">
      ${escapeHtml(data.job)}
    </a>
  </div>
</div>

<div class="section-card">
  <div class="section-title">직업 분류</div>
  <p class="section-text">${escapeHtml(data.jobCategory || '정보 없음')}</p>
</div>

<div class="section-card">
  <div class="section-title">직업 해설</div>
  <p class="section-text">${escapeHtml(data.description || '')}</p>
</div>

<div class="section-card">
  <div class="section-title">핵심 전문 지식</div>
  <p class="section-text">${escapeHtml(data.knowledge || '')}</p>
</div>

<div class="section-card">
  <div class="section-title">추천 학과 / 전공</div>
  <p class="section-text">${escapeHtml(data.major || '')}</p>
</div>

<div class="section-card">
  <div class="section-title">준비 기간</div>
  <p class="section-text">${escapeHtml(data.prepPeriod || '')}</p>
</div>

<div class="process-card">
  <div class="process-title">추천 산출 과정</div>
  <div class="process-step">
    <div class="step-num">1</div>
    <div class="step-content">
      <div class="step-label">조건 필터링</div>
      <p class="step-text">국가, 시기, 학업 계획 기준으로 ${escapeHtml(data.firstCount || 0)}개 추출</p>
    </div>
  </div>
  <div class="process-step">
    <div class="step-num">2</div>
    <div class="step-content">
      <div class="step-label">성향 매칭</div>
      <p class="step-text">RIASEC과 Big5 <strong>둘 다</strong> 일치하는 <strong>${escapeHtml(data.matchedCount || 0)}개</strong> 선별</p>
    </div>
  </div>
  <div class="process-step">
    <div class="step-num">3</div>
    <div class="step-content">
      <div class="step-label">최종 추천</div>
      <p class="step-text">매칭된 후보 중 연봉순위 가장 높은 직업 1개 선택</p>
    </div>
  </div>
</div>

<div class="section-card">
  <div class="section-title">성향매칭후보 상세보기</div>
  <div class="section-text" style="white-space:normal; line-height:1.2;">
    ${hasCandidates
      ? secondCandidates.map((item, index) => `
          <div style="padding:0 0 6px 0; border-bottom:1px solid rgba(148,163,184,0.18);">
            <a href="job.html?country=${encodeURIComponent(data.country)}&job=${encodeURIComponent(item['추천직업'] || '')}"
               style="color:#2563eb; text-decoration:none; font-weight:600; line-height:1.3; display:inline-block;">
              연봉순위 ${index + 1}위 ${escapeHtml(item['추천직업'] || '')}
            </a>
          </div>`).join('')
      : '후보 데이터가 없습니다.'}
  </div>
</div>

<a href="index.html" class="back-btn">← 다시 입력하기</a>

<div class="download-wrap">
  <!-- STEP 4: 직업카드 이미지 저장 -->
  <button id="shareCardBtn" class="download-btn"
    style="background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;">
    📷 내 직업카드 이미지 저장
  </button>

  <button id="downloadBtn" class="download-btn" ${hasCandidates ? '' : 'disabled'}>
    🔒 성향매칭 ${escapeHtml(data.matchedCount || 0)}개 전체 다운로드(r)
  </button>

  <button class="download-btn" style="margin-top:10px; background-color:#475569; color:#fff;"
          onclick="window.open('AI.html')">
    모르는 용어,문장 AI앞 문의하기
  </button>

  <button class="download-btn" style="margin-top:10px; background-color:#fee500; color:#000;"
          onclick="window.open('https://open.kakao.com/o/g6YIdfmi')">
    개발자앞 직접문의(카톡오픈채팅)
  </button>

  <!-- STEP 6: 학교·학원용 QR코드 공유 -->
  <div id="qrSection" style="margin-top:18px; padding:16px; background:#1e293b;
       border-radius:12px; border:1px solid #334155; text-align:center;">
    <p style="font-size:0.82rem; color:#94a3b8; margin:0 0 10px 0;">
      📌 선생님·학원용 — QR코드로 학생 전체에게 배포하세요
    </p>
    <button id="qrBtn" class="download-btn"
      style="background:#0f766e; color:#fff; margin-bottom:12px;">
      🔲 이 페이지 QR코드 생성
    </button>
    <div id="qrDisplay" style="display:none; margin-top:8px;">
      <img id="qrImg" src="" alt="QR코드"
           style="width:160px; height:160px; border-radius:8px; background:#fff; padding:6px;">
      <p style="font-size:0.78rem; color:#64748b; margin:8px 0 0 0;">
        이미지를 꾹 눌러 저장하거나 캡처해서 사용하세요
      </p>
      <button id="qrDownloadBtn" class="download-btn"
        style="margin-top:8px; background:#0f766e; color:#fff; font-size:0.82rem; padding:8px 16px;">
        ⬇️ QR 이미지 저장
      </button>
    </div>
  </div>
</div>`;

      // ── 이벤트 리스너 ─────────────────────────────────────────
      if (hasCandidates) {
        document.getElementById('downloadBtn')?.addEventListener('click', () => {
          downloadSecondCandidatesExcel(secondCandidates, data.name, data.dob, data.period);
        });
      }

      // STEP 4: 카드 이미지 저장
      document.getElementById('shareCardBtn')?.addEventListener('click', () => {
        downloadShareCard(data);
      });

      // STEP 6: QR코드 생성
      document.getElementById('qrBtn')?.addEventListener('click', () => {
        const url = encodeURIComponent(window.location.href);
        const qrApiUrl = `https://chart.googleapis.com/chart?cht=qr&chs=320x320&chl=${url}&choe=UTF-8`;
        const img     = document.getElementById('qrImg');
        const display = document.getElementById('qrDisplay');
        const btn     = document.getElementById('qrBtn');

        img.src = qrApiUrl;
        img.onload = () => {
          display.style.display = 'block';
          btn.textContent = '🔲 QR코드 재생성';
        };
      });

      // STEP 6: QR 이미지 저장
      document.getElementById('qrDownloadBtn')?.addEventListener('click', () => {
        const img = document.getElementById('qrImg');
        if (!img.src) return;
        const a = document.createElement('a');
        a.href = img.src;
        a.download = 'futurejob_qr.png';
        a.click();
      });
    }

    // ==================== 메인 로직 ====================
    async function loadAndDisplayResult() {
      const el = document.getElementById('resultContent');
      const userInput = JSON.parse(localStorage.getItem('futureJob_userInput'));

      if (!userInput) {
        el.innerHTML = '<div class="empty-box"><p>입력 정보가 없습니다.</p><a href="index.html" class="back-btn">← 다시 입력하기</a></div>';
        return;
      }

      try {
        const countryFileMap = {
          '대한민국': 'KR.json', '미국': 'US.json', '일본': 'JP.json',
          '독일': 'DE.json', '캐나다': 'CA.json', '호주': 'AU.json',
          '싱가포르': 'SG.json', '영국': 'UK.json', '중국': 'CN.json',
          '인도': 'IN.json', '베트남': 'VN.json', '태국': 'TH.json',
          '인도네시아': 'ID.json', '아랍에미리트': 'AE.json', '사우디아라비아': 'SA.json',
          '이스라엘': 'IL.json', '프랑스': 'FR.json', '이탈리아': 'IT.json',
          '스위스': 'CH.json', '튀르키예': 'TR.json', '폴란드': 'PL.json',
          '멕시코': 'MX.json', '브라질': 'BR.json', '남아프리카공화국': 'ZA.json',
          '나이지리아': 'NG.json', '러시아': 'RU.json'
        };

        const country = String(userInput.country || '').trim();
        const fileName = countryFileMap[country];
        if (!fileName) throw new Error('국가 데이터 파일을 찾을 수 없습니다.');

        const res = await fetch(`./data/${fileName}`);
        if (!res.ok) throw new Error(`데이터 로드 실패: ${res.status}`);
        const jobData = await res.json();

        const riasecList = [userInput.riasec].filter(Boolean);
        const big5List   = [userInput.big5].filter(Boolean);

        if (!riasecList.length || !big5List.length) {
          throw new Error('RIASEC 또는 BIG5 유형이 선택되지 않았습니다.');
        }

        const birthYear = parseInt(userInput.dob, 10);
        const addYear   = userInput.ability === '상' ? 30 : userInput.ability === '중' ? 26 : 22;
        const period    = `${Math.floor((birthYear + addYear) / 10) * 10}년대`;

        const firstCandidates = jobData.filter(row =>
          String(row['국가'] || '').trim() === country &&
          row['시기'] === period &&
          row['직업등급'] === userInput.ability
        );

        if (!firstCandidates.length) throw new Error(`'${period}' 시기 데이터가 없습니다.`);

        const realMatchedCandidates = firstCandidates.filter(row => {
          const rCodes = (row['RIASEC'] || '').split(',').map(s => s.trim()).filter(Boolean);
          const bCodes = (row['BIG5']   || '').split(',').map(s => s.trim()).filter(Boolean);
          return riasecList.some(code => rCodes.includes(code)) &&
                 big5List.some(code   => bCodes.includes(code));
        });

        const realMatchedCount  = realMatchedCandidates.length;
        const matchedCandidates = realMatchedCount ? [...realMatchedCandidates] : [firstCandidates[0]];

        matchedCandidates.sort((a, b) =>
          parseInt(a['연봉순위'] || 9999, 10) - parseInt(b['연봉순위'] || 9999, 10)
        );

        const best = matchedCandidates[0];

        const result = {
          name:         userInput.name,
          country,
          dob:          userInput.dob,
          period,
          riasec:       userInput.riasec || '',   // STEP 4 카드용
          big5:         userInput.big5   || '',   // STEP 4 카드용
          job:          best['추천직업']       || '',
          salaryRank:   best['연봉순위']        || '',
          description:  best['직업해설']        || '',
          knowledge:    best['핵심전문지식']     || '',
          major:        best['추천학과/전공']    || '',
          prepPeriod:   best['준비기간']         || '',
          jobCategory:  best['직업분류']         || '정보 없음',
          firstCount:   firstCandidates.length,
          matchedCount: realMatchedCount
        };

        await saveToDB(KEY_LATEST, result);
        await saveToDB(KEY_SECOND, matchedCandidates);

        displayResult(result, matchedCandidates);

      } catch (err) {
        console.error(err);
        el.innerHTML = `<div class="empty-box"><p>${escapeHtml(err.message)}</p><a href="index.html" class="back-btn">← 다시 입력하기</a></div>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadAndDisplayResult);
  </script>
</body>
</html>

  <script>
    // ==================== 유틸리티 함수 ====================
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function toText(value) {
      if (Array.isArray(value)) return value.join(', ');
      if (value === null || value === undefined) return '';
      return String(value);
    }

    function updateResultMeta(data) {
      const title = `${data.job || '미래직업 추천결과'} | FutureJob`;
      document.title = title;

      const descText = data.description && String(data.description).trim()
        ? String(data.description).trim().slice(0, 140)
        : '개인 입력값을 바탕으로 산출된 미래직업 추천 결과 페이지';

      let descMeta = document.querySelector('meta[name="description"]');
      if (descMeta) descMeta.setAttribute('content', descText);

      let robotsMeta = document.querySelector('meta[name="robots"]');
      if (robotsMeta) robotsMeta.setAttribute('content', 'noindex, nofollow, noarchive');
    }

    // ==================== IndexedDB 헬퍼 ====================
    const DB_NAME = "JobRecommenderDB";
    const STORE_NAME = "results";
    const KEY_LATEST = "latest_result";
    const KEY_SECOND = "latest_second_candidates";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error || new Error("IndexedDB 열기 실패"));
      });
    }

    async function saveToDB(key, value) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const store = tx.objectStore(STORE_NAME);
          store.put(value, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (err) {
        console.error("IndexedDB 저장 오류:", err);
      }
    }

    // ==================== 엑셀 생성 함수 ====================
    function normalizeStudyPlan(userInput) {
      return toText(userInput?.studyPlan || userInput?.educationPlan ||
                    userInput?.plan || userInput?.abilityLabel || userInput?.ability || '');
    }
    function normalizeRiasec(userInput) {
      return toText(userInput?.riasecLabel || userInput?.riasecText ||
                    userInput?.riasecName  || userInput?.riasec || '');
    }
    function normalizeBig5(userInput) {
      return toText(userInput?.big5Label || userInput?.big5Text ||
                    userInput?.big5Name  || userInput?.big5 || '');
    }

    function buildExcelExportInfo(userInput, fallback = {}) {
      const birthYear = toText(userInput?.dob || fallback.birthYear || '');
      const ability = toText(userInput?.abilityLabel || userInput?.ability || fallback.studyPlan || '');
      return {
        name:      toText(userInput?.name || fallback.name || '사용자'),
        birthYear,
        country:   toText(userInput?.country || fallback.country || ''),
        studyPlan: normalizeStudyPlan(userInput) || ability,
        period:    toText(fallback.period || userInput?.period || ''),
        riasec:    normalizeRiasec(userInput),
        big5:      normalizeBig5(userInput)
      };
    }

    function loadExcelJs() {
      if (window.ExcelJS) return Promise.resolve(window.ExcelJS);
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
        script.onload = () => window.ExcelJS ? resolve(window.ExcelJS) : reject(new Error('ExcelJS 로드 실패'));
        script.onerror = () => reject(new Error('ExcelJS 스크립트를 불러오지 못했습니다.'));
        document.head.appendChild(script);
      });
    }

    async function buildStyledWorkbook(rows, exportInfo = {}) {
      const ExcelJS = await loadExcelJs();
      const workbook = new ExcelJS.Workbook();
      workbook.creator = 'FutureJob';
      workbook.created = new Date();

      const ws = workbook.addWorksheet('2nd Candidates', { views: [{ showGridLines: true }] });
      ws.columns = [
        { key: 'A', width: 13.0 }, { key: 'B', width: 10.5 },
        { key: 'C', width: 22.625 }, { key: 'D', width: 13.0 },
        { key: 'E', width: 40.625 }, { key: 'F', width: 31.0 },
        { key: 'G', width: 28.75 },  { key: 'H', width: 20.0 }
      ];

      const fillBlue = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'D9E2F3' } };
      const mediumBorder = {
        top: { style: 'medium', color: { argb: '7F7F7F' } }, left: { style: 'medium', color: { argb: '7F7F7F' } },
        bottom: { style: 'medium', color: { argb: '7F7F7F' } }, right: { style: 'medium', color: { argb: '7F7F7F' } }
      };
      const thinBorder = {
        top: { style: 'thin', color: { argb: 'BFBFBF' } }, left: { style: 'thin', color: { argb: 'BFBFBF' } },
        bottom: { style: 'thin', color: { argb: 'BFBFBF' } }, right: { style: 'thin', color: { argb: 'BFBFBF' } }
      };
      const topLabelStyle    = { font: { name: '맑은 고딕', size: 12, bold: true },  fill: fillBlue, border: mediumBorder, alignment: { vertical: 'middle', horizontal: 'left',   wrapText: true } };
      const topValueStyle    = { font: { name: '맑은 고딕', size: 12, bold: false }, fill: fillBlue, border: mediumBorder, alignment: { vertical: 'middle', horizontal: 'left',   wrapText: true } };
      const topEmphasisStyle = { font: { name: '맑은 고딕', size: 12, bold: true },  fill: fillBlue, border: mediumBorder, alignment: { vertical: 'middle', horizontal: 'left',   wrapText: true } };
      const headerStyle      = { font: { name: '맑은 고딕', size: 12, bold: true },                  border: mediumBorder, alignment: { vertical: 'middle', horizontal: 'center', wrapText: true } };
      const bodyStyle        = { font: { name: '맑은 고딕', size: 12, bold: false },                 border: thinBorder,   alignment: { vertical: 'top',    horizontal: 'left',   wrapText: true } };
      const bodyCenterStyle  = { font: { name: '맑은 고딕', size: 12, bold: false },                 border: thinBorder,   alignment: { vertical: 'top',    horizontal: 'center', wrapText: true } };

      const blankRow = () => ws.addRow([]);
      blankRow();
      const r2 = ws.addRow([null, '성명', exportInfo.name || '사용자', exportInfo.birthYear ? `${exportInfo.birthYear}년생` : '', null, null, null, null]);
      const r3 = ws.addRow([null, '취업국가', '학업계획', '취업 시기', '직업흥미유형 (RIASEC)', '개인 성향 (Big5)', null, null]);
      const r4 = ws.addRow([null, exportInfo.country || '', exportInfo.studyPlan || '', exportInfo.period || '', exportInfo.riasec || '', exportInfo.big5 || '', null, null]);
      blankRow();
      const r6 = ws.addRow([null, '연봉순위', '직업명', '직업분류', '직업 해설', '핵심전문지식', '추천학과/전공', '준비기간']);
      [r2, r3, r4, r6].forEach(row => row.height = 24);

      ['B2','C2','D2'].forEach(addr => Object.assign(ws.getCell(addr), { style: addr === 'B2' ? topLabelStyle : topEmphasisStyle }));
      ['B3','C3','D3','E3','F3'].forEach(addr => Object.assign(ws.getCell(addr), { style: topLabelStyle }));
      ['B4','C4','D4','E4','F4'].forEach(addr => Object.assign(ws.getCell(addr), { style: topValueStyle }));
      ['B6','C6','D6','E6','F6','G6','H6'].forEach(addr => Object.assign(ws.getCell(addr), { style: headerStyle }));

      rows.forEach((item) => {
        const row = ws.addRow([null, item['연봉순위']||'', item['추천직업']||'', item['직업분류']||'',
                                item['직업해설']||'', item['핵심전문지식']||'', item['추천학과/전공']||'', item['준비기간']||'']);
        row.height = 74;
        row.getCell(2).style = bodyCenterStyle;
        for (let i = 3; i <= 8; i++) row.getCell(i).style = bodyStyle;
      });

      ws.pageSetup = {
        paperSize: 9, orientation: 'landscape', fitToPage: true, fitToWidth: 1, fitToHeight: 0,
        margins: { left: 0.3, right: 0.3, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2 }
      };
      ws.getColumn('A').eachCell((cell) => { cell.border = {}; });
      return workbook;
    }

    // ==================== 결과 이미지 카드 저장 (STEP 4) ====================
    function fillShareCard(result) {
      const riasecLabel = { R:'🔧 만들고 조작', I:'🔬 파고들고 연구', A:'🎨 만들고 표현', S:'🤝 돕고 함께', E:'🚀 이끌고 도전', C:'📋 정리하고 관리' };
      const big5Label   = { O:'✨ 호기심', C:'📌 계획적', E:'😊 외향적', A:'💛 배려심', N:'🛡 신중함' };

      document.getElementById('sc_name').textContent = `${result.name || ''}의 미래 직업`;
      document.getElementById('sc_job').textContent  = result.job || '';
      document.getElementById('sc_meta').textContent = `${result.country} · ${result.period} · 연봉순위 ${result.salaryRank || '-'}위`;

      const fullDesc = result.description || '';
      const firstSentence = fullDesc.split(/[.。]/)[0].trim();
      document.getElementById('sc_desc').textContent = firstSentence ? firstSentence + '.' : '';

      const tags = [];
      if (result.riasec) tags.push(riasecLabel[result.riasec] || result.riasec);
      if (result.big5)   tags.push(big5Label[result.big5]     || result.big5);
      document.getElementById('sc_tags').innerHTML = tags.map(t =>
        `<span style="background:#1e3a5f;color:#93c5fd;border-radius:20px;padding:4px 12px;font-size:11px;">${t}</span>`
      ).join('');
    }

    async function downloadShareCard(result) {
      const btn = document.getElementById('shareCardBtn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ 생성 중...'; }
      try {
        fillShareCard(result);
        const card = document.getElementById('shareCard');
        card.style.left = '-9999px';
        card.style.visibility = 'visible';
        await new Promise(r => setTimeout(r, 150));

        const canvas = await html2canvas(card, { scale: 2, useCORS: true, backgroundColor: null, logging: false });
        card.style.visibility = 'hidden';

        const link = document.createElement('a');
        link.download = `미래직업_${result.job || 'card'}.png`;
        link.href = canvas.toDataURL('image/png');
        gtag('event', 'save_card_image', { job: result.job, country: result.country });

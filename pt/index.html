    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Profissões do Futuro</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Nome completo</label>
          <input id="name" name="name" type="text" placeholder="Digite seu nome" required>
        </div>

        <div class="field">
          <label for="dob">Ano de nascimento <span style="font-weight:400;color:#64748b">: determina o período de entrada no mercado</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="ex. 2005" required>
        </div>

        <div class="field">
          <label for="country">País alvo</label>
          <select id="country" name="country">
            <option value="브라질">🇧🇷 Brasil</option>
            <option value="미국">🇺🇸 미국</option>
            <option value="영국">🇬🇧 영국</option>
            <option value="캐나다">🇨🇦 캐나다</option>
            <option value="호주">🇦🇺 호주</option>
            <option value="독일">🇩🇪 독일</option>
            <option value="프랑스">🇫🇷 프랑스</option>
            <option value="이탈리아">🇮🇹 이탈리아</option>
            <option value="스위스">🇨🇭 스위스</option>
            <option value="폴란드">🇵🇱 폴란드</option>
            <option value="싱가포르">🇸🇬 싱가포르</option>
            <option value="일본">🇯🇵 일본</option>
            <option value="중국">🇨🇳 중국</option>
            <option value="인도">🇮🇳 인도</option>
            <option value="베트남">🇻🇳 베트남</option>
            <option value="태국">🇹🇭 태국</option>
            <option value="인도네시아">🇮🇩 인도네시아</option>
            <option value="아랍에미리트">🇦🇪 아랍에미리트</option>
            <option value="사우디아라비아">🇸🇦 사우디아라비아</option>
            <option value="이스라엘">🇮🇱 이스라엘</option>
            <option value="튀르키예">🇹🇷 튀르키예</option>
            <option value="멕시코">🇲🇽 멕시코</option>
            <option value="남아프리카공화국">🇿🇦 남아프리카공화국</option>
            <option value="나이지리아">🇳🇬 나이지리아</option>
            <option value="러시아">🇷🇺 러시아</option>
            <option value="대한민국">🇰🇷 대한민국</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Plano acadêmico <span style="font-weight:400;color:#64748b">: considere inteligência, esforço e notas</span></label>
          <select id="ability" name="ability">
            <option value="상">Mestrado / Doutorado planejado (nascidos 2000–2029)</option>
            <option value="중">Graduação / Universidade planejada (nascidos 2004–2033)</option>
            <option value="하">Técnico / Ensino profissional planejado (nascidos 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Tipo de interesse profissional (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Realista — Gosto de trabalhar com máquinas e ferramentas</option>
            <option value="I">🔬 Investigativo — Adoro dados, ciência e resolver problemas</option>
            <option value="A">🎨 Artístico — Me expresso através do design e da criatividade</option>
            <option value="S">🤝 Social — Me realizo ajudando e trabalhando com pessoas</option>
            <option value="E">🚀 Empreendedor — Liderança e persuasão são meus pontos fortes</option>
            <option value="C">📋 Convencional — Prefiro trabalho estruturado e organizado</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Tipo de personalidade (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Abertura — Curioso, imaginativo, ama novas ideias</option>
            <option value="C">📌 Consciencioso — Organizado, responsável e confiável</option>
            <option value="E">😊 Extrovertido — Energizado por ambientes sociais</option>
            <option value="A">💛 Agradável — Prestativo, cooperativo e empático</option>
            <option value="N">🛡 Neurótico — Cauteloso, sensível ao risco, detalhista</option>
          </select>
        </div>

        <div class="gold-divider"></div>
        <button type="submit" class="submit-btn">Ver minha profissão do futuro →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Os resultados estão em coreano — use a tradução automática do Chrome.
      </p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Por favor, insira um ano de nascimento válido (ex. 2005).';
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5, lang: 'pt'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

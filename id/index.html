      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">Nghề Nghiệp Tương Lai</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">

        <div class="field">
          <label for="name">Họ và tên</label>
          <input id="name" name="name" type="text" placeholder="Nhập tên của bạn" required>
        </div>

        <div class="field">
          <label for="dob">Năm sinh <span style="font-weight:400;color:#64748b">: xác định thời điểm bắt đầu đi làm</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="vd. 2005" required>
        </div>

        <div class="field">
          <label for="country">Quốc gia mục tiêu</label>
          <select id="country" name="country">
            <option value="베트남">🇻🇳 Việt Nam</option>
            <option value="미국">🇺🇸 미국</option>
            <option value="영국">🇬🇧 영국</option>
            <option value="캐나다">🇨🇦 캐나다</option>
            <option value="호주">🇦🇺 호주</option>
            <option value="독일">🇩🇪 독일</option>
            <option value="프랑스">🇫🇷 프랑스</option>
            <option value="이탈리아">🇮🇹 이탈리아</option>
            <option value="스위스">🇨🇭 스위스</option>
            <option value="폴란드">🇵🇱 폴란드</option>
            <option value="싱가포르">🇸🇬 싱가포르</option>
            <option value="일본">🇯🇵 일본</option>
            <option value="중국">🇨🇳 중국</option>
            <option value="인도">🇮🇳 인도</option>
            <option value="태국">🇹🇭 태국</option>
            <option value="인도네시아">🇮🇩 인도네시아</option>
            <option value="아랍에미리트">🇦🇪 아랍에미리트</option>
            <option value="사우디아라비아">🇸🇦 사우디아라비아</option>
            <option value="이스라엘">🇮🇱 이스라엘</option>
            <option value="튀르키예">🇹🇷 튀르키예</option>
            <option value="멕시코">🇲🇽 멕시코</option>
            <option value="브라질">🇧🇷 브라질</option>
            <option value="남아프리카공화국">🇿🇦 남아프리카공화국</option>
            <option value="나이지리아">🇳🇬 나이지리아</option>
            <option value="러시아">🇷🇺 러시아</option>
            <option value="대한민국">🇰🇷 대한민국</option>
          </select>
        </div>

        <div class="field">
          <label for="ability">Kế hoạch học tập <span style="font-weight:400;color:#64748b">: xem xét trí tuệ, nỗ lực và điểm số</span></label>
          <select id="ability" name="ability">
            <option value="상">Thạc sĩ / Tiến sĩ dự kiến (sinh 2000–2029)</option>
            <option value="중">Đại học / Cao học dự kiến (sinh 2004–2033)</option>
            <option value="하">Cao đẳng / Trung cấp nghề dự kiến (sinh 2008–2037)</option>
          </select>
        </div>

        <div class="field">
          <label for="riasec">Loại hứng thú nghề nghiệp (RIASEC)</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 Thực tế — Tôi thích làm việc với máy móc và công cụ</option>
            <option value="I">🔬 Nghiên cứu — Tôi yêu dữ liệu, khoa học và giải quyết vấn đề</option>
            <option value="A">🎨 Nghệ thuật — Tôi thể hiện bản thân qua thiết kế và sáng tạo</option>
            <option value="S">🤝 Xã hội — Giúp đỡ và làm việc với mọi người mang lại ý nghĩa cho tôi</option>
            <option value="E">🚀 Kinh doanh — Lãnh đạo và thuyết phục là điểm mạnh của tôi</option>
            <option value="C">📋 Quy củ — Tôi thích công việc có cấu trúc và ngăn nắp</option>
          </select>
        </div>

        <div class="field">
          <label for="big5">Loại tính cách (Big5)</label>
          <select id="big5" name="big5">
            <option value="O">✨ Cởi mở — Tò mò, sáng tạo, thích những ý tưởng mới</option>
            <option value="C">📌 Tận tâm — Có tổ chức, có trách nhiệm và đáng tin cậy</option>
            <option value="E">😊 Hướng ngoại — Lấy năng lượng từ môi trường xã hội</option>
            <option value="A">💛 Dễ chịu — Hữu ích, hợp tác và đồng cảm</option>
            <option value="N">🛡 Nhạy cảm — Thận trọng, nhạy cảm với rủi ro, chú ý chi tiết</option>
          </select>
        </div>

        <div class="gold-divider"></div>
        <button type="submit" class="submit-btn">Xem nghề nghiệp tương lai của tôi →</button>

      </form>
      <p id="formMessage" class="form-message"></p>
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.6;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ Kết quả bằng tiếng Hàn — hãy dùng tính năng dịch tự động của Chrome.
      </p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());

      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = 'Vui lòng nhập năm sinh hợp lệ (vd. 2005).';
        return;
      }

      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5, lang: 'vi'
      });

      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

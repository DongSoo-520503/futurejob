    <div class="header">
      <h1 style="font-size:1.1rem; font-weight:700; margin:0;">未来职业推荐</h1>
      <div class="gold-divider"></div>
    </div>

    <div class="card">
      <form id="jobForm" class="form-grid">
        <div class="field">
          <label for="name">姓名</label>
          <input id="name" name="name" type="text" placeholder="请输入您的姓名" required>
        </div>
        <div class="field">
          <label for="dob">出生年份 <span style="font-weight:400;color:#64748b">: 用于推算就业时间</span></label>
          <input id="dob" name="dob" type="number" inputmode="numeric" placeholder="例：2005" required>
        </div>
        <div class="field">
          <label for="country">目标国家</label>
          <select id="country" name="country">
            <option value="중국">🇨🇳 中国</option>
            <option value="미국">🇺🇸 美国</option>
            <option value="영국">🇬🇧 英国</option>
            <option value="캐나다">🇨🇦 加拿大</option>
            <option value="호주">🇦🇺 澳大利亚</option>
            <option value="독일">🇩🇪 德国</option>
            <option value="프랑스">🇫🇷 法国</option>
            <option value="이탈리아">🇮🇹 意大利</option>
            <option value="스위스">🇨🇭 瑞士</option>
            <option value="폴란드">🇵🇱 波兰</option>
            <option value="싱가포르">🇸🇬 新加坡</option>
            <option value="일본">🇯🇵 日本</option>
            <option value="인도">🇮🇳 印度</option>
            <option value="베트남">🇻🇳 越南</option>
            <option value="태국">🇹🇭 泰国</option>
            <option value="인도네시아">🇮🇩 印度尼西亚</option>
            <option value="아랍에미리트">🇦🇪 阿联酋</option>
            <option value="사우디아라비아">🇸🇦 沙特阿拉伯</option>
            <option value="이스라엘">🇮🇱 以色列</option>
            <option value="튀르키예">🇹🇷 土耳其</option>
            <option value="멕시코">🇲🇽 墨西哥</option>
            <option value="브라질">🇧🇷 巴西</option>
            <option value="남아프리카공화국">🇿🇦 南非</option>
            <option value="나이지리아">🇳🇬 尼日利亚</option>
            <option value="러시아">🇷🇺 俄罗斯</option>
            <option value="대한민국">🇰🇷 韩国</option>
          </select>
        </div>
        <div class="field">
          <label for="ability">学业计划 <span style="font-weight:400;color:#64748b">: 综合考虑智力、努力和成绩</span></label>
          <select id="ability" name="ability">
            <option value="상">硕士 / 博士计划（出生年份 2000–2029）</option>
            <option value="중">本科 / 大学计划（出生年份 2004–2033）</option>
            <option value="하">专科 / 职业学校计划（出生年份 2008–2037）</option>
          </select>
        </div>
        <div class="field">
          <label for="riasec">职业兴趣类型（RIASEC）</label>
          <select id="riasec" name="riasec">
            <option value="R">🔧 实用型 — 喜欢使用机械和工具进行实际操作</option>
            <option value="I">🔬 研究型 — 热爱数据、科学和解决问题</option>
            <option value="A">🎨 艺术型 — 通过设计和创意来表达自我</option>
            <option value="S">🤝 社会型 — 从帮助他人和团队合作中获得意义</option>
            <option value="E">🚀 企业型 — 领导力和说服力是我的强项</option>
            <option value="C">📋 常规型 — 偏好有条理、规范化的工作方式</option>
          </select>
        </div>
        <div class="field">
          <label for="big5">性格类型（Big5）</label>
          <select id="big5" name="big5">
            <option value="O">✨ 开放性 — 好奇、有创意，喜欢新想法和变化</option>
            <option value="C">📌 尽责性 — 有条理、负责任、做事有始有终</option>
            <option value="E">😊 外向性 — 在社交环境中充满活力</option>
            <option value="A">💛 宜人性 — 乐于助人、善于合作、富有同理心</option>
            <option value="N">🛡 神经质 — 谨慎、对风险敏感、注重细节</option>
          </select>
        </div>
        <div class="gold-divider"></div>
        
      <p style="font-size:0.82rem; font-weight:700; text-align:center; margin-top:12px; line-height:1.8;
                 background:linear-gradient(135deg,#b8860b,#ffd700);
                 -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ※ 结果以韩语显示 — 请使用Chrome浏览器的自动翻译功能
      </p>
        <button type="submit" class="submit-btn">查看我的未来职业 →</button>
      </form>
      <p id="formMessage" class="form-message"></p>
    </div>
  </div>

  <script>
    document.getElementById('jobForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const userData = Object.fromEntries(formData.entries());
      const birthYear = parseInt(userData.dob, 10);
      if (Number.isNaN(birthYear) || birthYear < 1900 || birthYear > 2100) {
        document.getElementById('formMessage').textContent = '请输入有效的出生年份（例：2005）。';
        return;
      }
      gtag('event', 'submit_form', {
        country: userData.country, ability: userData.ability,
        riasec: userData.riasec, big5: userData.big5,
        lang:    'zh'
      });
      const params = new URLSearchParams({
        name: userData.name, dob: userData.dob, country: userData.country,
        ability: userData.ability, riasec: userData.riasec, big5: userData.big5,
        lang: 'zh'
      });
      window.location.href = `../result.html?${params.toString()}`;
    });
  </script>

<script>
  // 언어 버튼 스크롤 항상 맨 왼쪽 고정
  document.addEventListener('DOMContentLoaded', function() {

    if (sw) { sw.scrollLeft = 0; }
  });
</script>
